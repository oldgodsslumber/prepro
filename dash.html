// ── TODAY SECTION ──
// ── SEQUENCE-AWARE SUGGESTIONS ──
// For a given task today, detect a concrete "what's next" pattern and emit
// a one-sentence question. Always a question (not instruction) to keep
// confidence low and trust high. Silent rather than generic.
function daysBetween(dateA, dateB) {
  if (!dateA || !dateB) return null;
  const a = new Date(dateA + 'T00:00:00');
  const b = new Date(dateB + 'T00:00:00');
  return Math.round((b - a) / 86400000);
}
function fmtDayShort(dateStr, today) {
  const n = daysBetween(today, dateStr);
  if (n === 0) return 'today';
  if (n === 1) return 'tomorrow';
  if (n === -1) return 'yesterday';
  if (n > 0 && n <= 7) return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' });
  if (n < 0 && n >= -7) return 'last ' + new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long' });
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function buildTaskContext(task, personName, dateStr, proj) {
  const today = dateStr;
  const lp = (personName || '').toLowerCase();
  const isForPerson = t => t.person === personName
    || (t.attendees || []).some(a => a.person === personName);
  const isPTOForPerson = t => t.isDueDate && t.milestoneType === 'pto' && (
    (t.attendees || []).some(a => a.person && a.person.toLowerCase() === lp)
    || (t.taskName && t.taskName.toLowerCase().includes(lp))
  );

  const allTasks = (proj.tasks || []).filter(t => t.id !== task.id);
  const past = allTasks.filter(t => t.date && t.date < today).sort((a,b) => b.date.localeCompare(a.date));
  const future = allTasks.filter(t => t.date && t.date > today).sort((a,b) => a.date.localeCompare(b.date));

  const prev = past.find(isForPerson);
  const next = future.find(t => !t.isReview && !t.isDueDate);
  const nextReview = future.find(t => t.isReview && daysBetween(today, t.date) <= 7);
  const nextShoot = future.find(t => {
    const lbl = (t.reviewLabel || '').toLowerCase();
    return lbl.includes('shoot') && daysBetween(today, t.date) <= 7;
  });
  const nextKeyDate = future.find(t => {
    if (!t.isDueDate || t.milestoneType === 'pto') return false;
    return daysBetween(today, t.date) <= 7;
  });
  const personPTO = future.find(t => isPTOForPerson(t) && daysBetween(today, t.date) <= 5);

  const recentNotes = (proj.notes || []).filter(n => {
    if (!n || !n.date) return false;
    if (!['delay','blocker','direction','feedback'].includes(n.type)) return false;
    const d = daysBetween(n.date, today);
    return d !== null && d >= 0 && d <= 7;
  }).sort((a,b) => b.date.localeCompare(a.date));

  const lastTouched = prev ? daysBetween(prev.date, today) : null;

  const pastIncomplete = past.filter(t => isForPerson(t) && !isTaskDone(t.id) && !t.isDueDate).length;

  return { prev, next, nextReview, nextShoot, nextKeyDate, personPTO, recentNotes, lastTouched, pastIncomplete };
}

function findHeavyReviewer(reviewTask) {
  const attendees = reviewTask.attendees || [];
  for (const a of attendees) {
    if (!a.person) continue;
    const pts = getDayWorkload(a.person, reviewTask.date);
    if (pts >= 4) return a.person;
  }
  return null;
}

function patternPTOHandoff(task, personName, dateStr, proj, ctx) {
  if (!ctx.personPTO || !ctx.next) return null;
  if (daysBetween(dateStr, ctx.personPTO.date) > 3) return null;
  if (!ctx.next.person || ctx.next.person === personName) return null;
  if (ctx.next.date < ctx.personPTO.date) return null;
  const ptoDay = fmtDayShort(ctx.personPTO.date, dateStr);
  const nextDay = fmtDayShort(ctx.next.date, dateStr);
  const nextName = ctx.next.taskName || ctx.next.role || 'the next task';
  return `You're out ${ptoDay}. ${ctx.next.person} picks up ${nextName} ${nextDay} — drop them a note before you sign off?`;
}

function patternShootApproaching(task, personName, dateStr, proj, ctx) {
  if (!ctx.nextShoot) return null;
  const n = daysBetween(dateStr, ctx.nextShoot.date);
  if (n > 3) return null;
  const lbl = (ctx.nextShoot.reviewLabel || '').toLowerCase();
  const shootType = lbl.includes('on-location') ? 'On-location shoot' : 'Studio shoot';
  const day = fmtDayShort(ctx.nextShoot.date, dateStr);
  return `${shootType} ${day} — has the shotlist and call sheet gone out to the crew?`;
}

function patternKeyDateApproaching(task, personName, dateStr, proj, ctx) {
  if (!ctx.nextKeyDate) return null;
  if (daysBetween(dateStr, ctx.nextKeyDate.date) > 3) return null;
  const type = ctx.nextKeyDate.milestoneType;
  const label = type === 'delivery' ? 'Delivery' : type === 'due-date' ? 'Project due' : 'Milestone';
  const day = fmtDayShort(ctx.nextKeyDate.date, dateStr);
  return `${label} lands ${day} — is today's work on the critical path?`;
}

function patternReviewApproaching(task, personName, dateStr, proj, ctx) {
  if (!ctx.nextReview) return null;
  if (daysBetween(dateStr, ctx.nextReview.date) > 3) return null;
  const day = fmtDayShort(ctx.nextReview.date, dateStr);
  const reviewLabel = ctx.nextReview.reviewLabel || 'Review';
  const heavy = findHeavyReviewer(ctx.nextReview);
  if (heavy && heavy !== personName) {
    return `${reviewLabel} ${day}. ${heavy} has a heavy load that day — send early if you can?`;
  }
  return `${reviewLabel} ${day} — is today's draft the version you want stakeholders seeing?`;
}

function patternHandoffToNext(task, personName, dateStr, proj, ctx) {
  if (!ctx.next) return null;
  if (!ctx.next.person || ctx.next.person === personName) return null;
  const taskEnd = task.endDate || task.date;
  const gap = daysBetween(taskEnd, ctx.next.date);
  if (gap === null || gap > 2) return null;
  const day = fmtDayShort(ctx.next.date, dateStr);
  const nextName = ctx.next.taskName || ctx.next.role || 'their work';
  return `${ctx.next.person} starts ${nextName} ${day} — anything they should know before diving in?`;
}

function patternRecentNote(task, personName, dateStr, proj, ctx) {
  if (!ctx.recentNotes.length) return null;
  const note = ctx.recentNotes[0];
  const daysAgo = daysBetween(note.date, dateStr);
  if (daysAgo > 3) return null;
  const typeLabel = { delay: 'delay', blocker: 'blocker', direction: 'scope change', feedback: 'feedback' }[note.type] || note.type;
  const emoji = note.emoji || '📋';
  const author = note.person || 'Someone';
  const when = daysAgo === 0 ? 'today' : daysAgo === 1 ? 'yesterday' : `${daysAgo} days ago`;
  return `${emoji} ${author} flagged a ${typeLabel} ${when} — does today's task still fit?`;
}

function patternDrought(task, personName, dateStr, proj, ctx) {
  if (ctx.lastTouched == null) return null;
  if (ctx.lastTouched <= 14) return null;
  const weeks = Math.round(ctx.lastTouched / 7);
  return `First time back on ${proj.name} in ${weeks} week${weeks === 1 ? '' : 's'} — worth a quick resync with the producer before starting?`;
}

function patternStalledCluster(task, personName, dateStr, proj, ctx) {
  if (ctx.pastIncomplete < 3) return null;
  return `${ctx.pastIncomplete} tasks on ${proj.name} are past their scheduled date — re-scope any today?`;
}

function getTaskSuggestion(task, personName, dateStr) {
  if (!task || !personName || !dateStr) return null;
  if (task.isDueDate) return null; // don't suggest on PTO/milestones/due dates themselves
  if (isTaskDone(task.id)) return null;
  const proj = (state.projects || []).find(p => p.id === task.projectId);
  if (!proj) return null;

  const ctx = buildTaskContext(task, personName, dateStr, proj);

  const patterns = [
    patternPTOHandoff,
    patternShootApproaching,
    patternKeyDateApproaching,
    patternReviewApproaching,
    patternHandoffToNext,
    patternRecentNote,
    patternDrought,
    patternStalledCluster,
  ];
  for (const p of patterns) {
    const text = p(task, personName, dateStr, proj, ctx);
    if (text) return text;
  }
  return null;
}

function renderTodaySection() {
  const section = document.createElement('div');
  section.className = 'today-hero';

  const title = document.createElement('div');
  title.className = 'today-date-heading';
  title.textContent = fmtDateLong(selectedDate);
  section.appendChild(title);

  const tasks = getTasksForPerson(selectedPerson, selectedDate);

  if (!tasks.length) {
    const noTasks = document.createElement('div');
    noTasks.className = 'no-tasks';
    noTasks.textContent = 'Nothing scheduled';
    section.appendChild(noTasks);
    return section;
  }

  // Group by project
  const byProject = new Map();
  tasks.forEach(t => {
    if (!byProject.has(t.projectId)) byProject.set(t.projectId, { name: t.projectName, tasks: [] });
    byProject.get(t.projectId).tasks.push(t);
  });

  byProject.forEach(({ name, tasks: projTasks }, projectId) => {
    const card = document.createElement('div');
    card.className = 'today-card';

    // Collect unique roles for this project
    const roles = [...new Set(projTasks.flatMap(t => t.matchRoles))];

    const header = document.createElement('div');
    header.className = 'today-card-header';
    header.innerHTML = `<a class="today-card-project" href="team.html#project=${encodeURIComponent(projectId)}" target="_blank">${esc(name)}</a>` +
      roles.map(r => `<span class="role-tag" style="background:${getRoleColor(r)}">${esc(r)}</span>`).join('');
    header.appendChild(buildStatusSeg(projectId));
    card.appendChild(header);

    projTasks.forEach(task => {
      const block = document.createElement('div');
      block.className = 'today-task-block';

      const row = document.createElement('div');
      const done = isTaskDone(task.id);
      row.className = 'today-task-row' + (done ? ' completed' : '');

      // Checkbox
      const check = document.createElement('button');
      check.className = 'task-check' + (done ? ' checked' : '');
      check.textContent = done ? '\u2713' : '';
      check.title = done ? 'Mark incomplete' : 'Mark complete';
      check.addEventListener('click', () => toggleTaskDone(task.id));
      row.appendChild(check);

      // Task content
      let html = '';
      const taskLabel = task.taskName || task.reviewLabel || '(untitled)';
      html += `<span class="task-name">${esc(taskLabel)}</span>`;

      const multiDay = getMultiDayInfo(task, selectedDate);
      if (multiDay) {
        html += `<span class="task-days">Day ${multiDay.currentDay} of ${multiDay.totalDays}</span>`;
      }

      if (task.isReview) {
        const label = task.reviewLabel || 'Review';
        html += `<span class="task-badge">${esc(label)}</span>`;
      }
      if (task.isDueDate && task.milestoneType === 'pto') {
        html += `<span class="task-badge" style="background:rgba(108,99,255,.2);color:var(--accent)">PTO</span>`;
      }
      if (task.isDueDate && task.milestoneType === 'due-date') {
        html += `<span class="task-badge" style="background:rgba(224,123,57,.2);color:#e07b39">Due Date</span>`;
      }
      if (task.isDueDate && task.milestoneType === 'delivery') {
        html += `<span class="task-badge" style="background:rgba(76,186,106,.2);color:#4cba6a">Delivery</span>`;
      }
      if (task.isDueDate && task.milestoneType === 'milestone') {
        html += `<span class="task-badge" style="background:rgba(108,99,255,.2);color:var(--accent)">Milestone</span>`;
      }

      const contentSpan = document.createElement('span');
      contentSpan.style.cssText = 'display:contents';
      contentSpan.innerHTML = html;
      row.appendChild(contentSpan);

      // LOE — clickable to cycle
      if (!task.isDueDate) {
        const loeBtn = document.createElement('span');
        loeBtn.className = 'task-loe';
        loeBtn.textContent = LOE_EMOJI[task.loe || 'medium'] || LOE_EMOJI.medium;
        loeBtn.title = 'Click to change effort level';
        loeBtn.addEventListener('click', () => cycleLoe(task.projectId, task.id));
        row.appendChild(loeBtn);
      }

      // Note button
      const noteBtn = document.createElement('button');
      noteBtn.className = 'task-note-btn';
      noteBtn.textContent = '\u{1F4DD}';
      noteBtn.title = 'Add a note to this project';
      noteBtn.addEventListener('click', () => showNoteModal(task.projectId, task.projectName));
      row.appendChild(noteBtn);

      block.appendChild(row);

      // Sequence-aware suggestion — one per task, question-framed
      const suggestion = getTaskSuggestion(task, selectedPerson, selectedDate);
      if (suggestion) {
        const sugRow = document.createElement('div');
        sugRow.className = 'task-suggestion';
        sugRow.innerHTML = `<span class="ts-icon">💡</span>${esc(suggestion)}`;
        block.appendChild(sugRow);
      }

      // Subtasks area
      const subArea = document.createElement('div');
      subArea.className = 'subtask-area';
      const subs = getSubtasks(task.id);

      subs.forEach(sub => {
        const subRow = document.createElement('div');
        subRow.className = 'subtask-row';
        const subCheck = document.createElement('button');
        subCheck.className = 'subtask-check' + (sub.done ? ' checked' : '');
        subCheck.textContent = sub.done ? '\u2713' : '';
        subCheck.addEventListener('click', () => toggleSubtask(task.id, sub.id));
        subRow.appendChild(subCheck);
        const subText = document.createElement('span');
        subText.className = 'subtask-text' + (sub.done ? ' done' : '');
        subText.textContent = sub.text;
        subText.style.cursor = 'text';
        subText.title = 'Click to edit';
        subText.addEventListener('click', () => {
          const editInput = document.createElement('input');
          editInput.className = 'subtask-input';
          editInput.value = sub.text;
          editInput.style.flex = '1';
          let committed = false;
          const commitEdit = () => {
            if (committed) return;
            committed = true;
            if (editInput.value.trim()) editSubtask(task.id, sub.id, editInput.value);
            else renderAll();
          };
          editInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') commitEdit();
            if (e.key === 'Escape') { committed = true; renderAll(); }
          });
          editInput.addEventListener('blur', commitEdit);
          subText.replaceWith(editInput);
          editInput.focus();
          editInput.select();
        });
        subRow.appendChild(subText);
        const subDel = document.createElement('button');
        subDel.className = 'subtask-del';
        subDel.textContent = '\u00d7';
        subDel.title = 'Remove';
        subDel.addEventListener('click', () => removeSubtask(task.id, sub.id));
        subRow.appendChild(subDel);
        subArea.appendChild(subRow);
      });

      // Add subtask button / input
      const addBtn = document.createElement('button');
      addBtn.className = 'subtask-add-btn';
      addBtn.textContent = '+ Add subtask';
      addBtn.addEventListener('click', () => {
        addBtn.style.display = 'none';
        const inputRow = document.createElement('div');
        inputRow.className = 'subtask-input-row';
        const input = document.createElement('input');
        input.className = 'subtask-input';
        input.placeholder = 'Subtask...';
        let committed = false;
        const commit = () => {
          if (committed) return;
          committed = true;
          if (input.value.trim()) addSubtask(task.id, input.value);
          else { inputRow.remove(); addBtn.style.display = ''; }
        };
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            if (input.value.trim() && !committed) {
              committed = true;
              pendingAddSubtaskFor = task.id;
              addSubtask(task.id, input.value);
            } else {
              commit();
            }
          }
          if (e.key === 'Escape') { committed = true; inputRow.remove(); addBtn.style.display = ''; }
        });
        input.addEventListener('blur', commit);
        inputRow.appendChild(input);
        subArea.appendChild(inputRow);
        input.focus();
      });
      subArea.appendChild(addBtn);

      if (pendingAddSubtaskFor === task.id) {
        // Defer until layout settles. Don't clear the flag yet — if another
        // render replaces this DOM before the timeout fires, addBtn becomes
        // detached. The flag stays set so the next render can also schedule,
        // and whichever timeout finds a still-connected addBtn wins.
        setTimeout(() => {
          if (pendingAddSubtaskFor !== task.id) return;
          if (!addBtn.isConnected) return;
          pendingAddSubtaskFor = null;
          addBtn.click();
        }, 0);
      }

      block.appendChild(subArea);
      card.appendChild(block);
    });

    section.appendChild(card);
  });

  return section;
}

// ── HEADS UP — upcoming reviews, shoots, and teammate PTO ──
function getHeadsUpItems(personName, afterDate) {
  const items = [];
  const bizDays = getNextBusinessDays(afterDate, 5);
  const cutoff = bizDays[bizDays.length - 1]; // next 5 business days
  const peopleMap = getAllPeople();
  const personInfo = peopleMap.get(personName);
  if (!personInfo) return items;
  const myProjectIds = new Set(personInfo.projects.keys());

  (state.projects || []).filter(p => !p.completed && !p.ghost).forEach(proj => {
    (proj.tasks || []).forEach(task => {
      const start = task.date;
      const end = task.endDate || task.date;
      if (!start || end <= afterDate || start > cutoff) return;

      // Reviews & shoots this person is part of
      if (task.isReview) {
        let involved = false;
        if (task.attendees) {
          task.attendees.forEach(a => { if (a.person === personName) involved = true; });
        }
        if (involved) {
          const isShoot = (task.reviewLabel || '').includes('Shoot');
          items.push({
            type: isShoot ? 'shoot' : 'review',
            icon: isShoot ? '\u{1F3AC}' : '\u{1F4CB}',
            title: task.taskName || task.reviewLabel || 'Review',
            project: proj.name,
            projectId: proj.id,
            date: start,
            endDate: end !== start ? end : null,
            taskId: task.id
          });
        }
      }

      // Milestones with action keywords on my projects
      if (task.isDueDate && task.milestoneType !== 'pto' && myProjectIds.has(proj.id)) {
        const tn = (task.taskName || '').toLowerCase();
        const actionKeywords = [
          'kick-off','kick off','kickoff',
          'delivery','deliverable','deliver','handoff','hand-off','hand off',
          'launch','go live','go-live','golive',
          'final','finalize','lock',
          'approval','sign-off','sign off','signoff',
          'presentation','present','pitch',
          'onboard','on-board','onboarding',
          'start','begins','begin','deadline'
        ];
        if (actionKeywords.some(kw => tn.includes(kw))) {
          items.push({
            type: 'milestone',
            icon: '\u{1F3AF}',
            title: task.taskName || 'Milestone',
            project: proj.name,
            projectId: proj.id,
            date: start,
            endDate: end !== start ? end : null,
            taskId: task.id
          });
        }
      }

      // Teammate PTO on projects I'm involved in
      if (task.isDueDate && task.milestoneType === 'pto' && myProjectIds.has(proj.id)) {
        (task.attendees || []).forEach(a => {
          if (!a.person || a.person === personName) return;
          items.push({
            type: 'pto',
            icon: '\u{1F3D6}',
            title: a.person + ' — PTO',
            project: proj.name,
            projectId: proj.id,
            date: start,
            endDate: end !== start ? end : null,
            teammateName: a.person,
            teammateRole: a.role || null
          });
        });
        // Also check taskName for person references (PTO without attendees)
        if (!(task.attendees || []).length && task.taskName) {
          items.push({
            type: 'pto',
            icon: '\u{1F3D6}',
            title: task.taskName,
            project: proj.name,
            projectId: proj.id,
            date: start,
            endDate: end !== start ? end : null,
            teammateName: null,
            teammateRole: null
          });
        }
      }
    });
  });

  // Also find teammate PTO from OTHER projects where a teammate overlaps
  (state.projects || []).filter(p => !p.completed && !p.ghost && !myProjectIds.has(p.id)).forEach(proj => {
    (proj.tasks || []).forEach(task => {
      if (!task.isDueDate || task.milestoneType !== 'pto') return;
      const start = task.date;
      const end = task.endDate || task.date;
      if (!start || end <= afterDate || start > cutoff) return;

      // Check if any attendee is a teammate on one of my projects
      (task.attendees || []).forEach(a => {
        if (!a.person || a.person === personName) return;
        // Is this person on any of my projects?
        const theirInfo = peopleMap.get(a.person);
        if (!theirInfo) return;
        let sharedProject = null;
        for (const [pid] of theirInfo.projects) {
          if (myProjectIds.has(pid)) { sharedProject = theirInfo.projects.get(pid).name; break; }
        }
        if (sharedProject) {
          // Find their role on the shared project
          let sharedRole = null;
          for (const [pid] of theirInfo.projects) {
            if (myProjectIds.has(pid)) {
              const roles = theirInfo.projects.get(pid).roles;
              if (roles && roles.size) sharedRole = [...roles][0];
              break;
            }
          }
          items.push({
            type: 'pto',
            icon: '\u{1F3D6}',
            title: a.person + ' — PTO',
            project: sharedProject,
            projectId: [...myProjectIds].find(pid => theirInfo.projects.has(pid)) || null,
            date: start,
            endDate: end !== start ? end : null,
            teammateName: a.person,
            teammateRole: sharedRole
          });
        }
      });
    });
  });

  // Deduplicate by type+title+date
  const seen = new Set();
  const deduped = items.filter(item => {
    const key = item.type + '|' + item.title + '|' + item.date;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Consolidate already-started PTO into a single "Currently Out" card.
  // Upcoming PTO stays as individual items so the coaching prompts still fire.
  const startedPto = deduped.filter(i => i.type === 'pto' && i.date <= afterDate);
  const other = deduped.filter(i => !(i.type === 'pto' && i.date <= afterDate));

  if (startedPto.length) {
    // Collapse to unique teammates with their earliest-end
    const byPerson = new Map();
    startedPto.forEach(i => {
      const name = i.teammateName || i.title.replace(/ — PTO$/, '');
      if (!byPerson.has(name)) byPerson.set(name, { name, endDate: i.endDate || i.date });
      else {
        const existing = byPerson.get(name);
        const end = i.endDate || i.date;
        if (end > existing.endDate) existing.endDate = end;
      }
    });
    const people = [...byPerson.values()];
    other.push({
      type: 'pto',
      icon: '\u{1F3D6}',
      title: 'Currently Out (' + people.length + ')',
      project: '',
      date: afterDate,
      endDate: null,
      consolidated: true,
      outPeople: people
    });
  }

  return other.sort((a, b) => a.date.localeCompare(b.date));
}

// Returns { text, tasks[] } — tasks is the expandable list (may be empty)
function getHeadsUpPrompt(item, personName, afterDate) {
  const bizDays = getNextBusinessDays(afterDate, 5);
  const windowEnd = bizDays[bizDays.length - 1];
  const status = item.projectId ? getStatus(personName, item.projectId) : 'on-schedule';
  const isBehind = status === 'behind';
  const isAhead = status === 'ahead';

  if (item.type === 'pto' && item.teammateName && item.projectId) {
    const proj = (state.projects || []).find(p => p.id === item.projectId);
    if (!proj) return null;
    const name = item.teammateName;
    const role = item.teammateRole || '';
    const roleLower = role.toLowerCase();

    // Find tasks assigned to this teammate in the 5-day window
    const theirTasks = (proj.tasks || []).filter(t => {
      if (t.isDueDate) return false;
      if (t.person !== name) return false;
      const end = t.endDate || t.date;
      return t.date <= windowEnd && end >= afterDate;
    });

    // Calculate their workload weight
    let totalPts = 0;
    theirTasks.forEach(t => { totalPts += loePts(t.loe); });
    const heavy = totalPts >= 4;

    // Check if they're an attendee on any reviews in the window
    const theirReviews = (proj.tasks || []).filter(t => {
      if (!t.isReview) return false;
      const end = t.endDate || t.date;
      if (t.date > windowEnd || end < afterDate) return false;
      return (t.attendees || []).some(a => a.person === name);
    });

    // Status modifier
    const behindNote = isBehind ? ' This project is marked behind.' : '';
    const aheadNote = isAhead ? ` You\u2019re ahead on this project \u2014 good time to get ahead of it.` : '';
    const statusNote = behindNote || aheadNote;

    if (roleLower === 'stakeholder' || roleLower === 'designer' || roleLower === 'copywriter') {
      if (theirReviews.length) return { text: `Do you need sign-off from ${name} before they leave?${statusNote}`, tasks: theirTasks };
      if (theirTasks.length) return { text: `Does ${name} need to deliver anything before PTO?${statusNote}`, tasks: theirTasks };
      return { text: `Need anything from ${name} before they\u2019re out?${statusNote}`, tasks: [] };
    }
    if (roleLower === 'editor' || roleLower === 'animator') {
      if (heavy) return { text: `${name} has a heavy workload (${totalPts} pts) before PTO \u2014 is their work on track?${statusNote}`, tasks: theirTasks };
      if (theirTasks.length) return { text: `Is ${name}\u2019s work on track to finish before PTO?${statusNote}`, tasks: theirTasks };
      return { text: `Has ${name} handed off their work?${statusNote}`, tasks: [] };
    }
    if (roleLower === 'producer') {
      return { text: `Who\u2019s covering for ${name} while they\u2019re out?${statusNote}`, tasks: theirTasks };
    }
    // Generic
    if (heavy) return { text: `${name} has a heavy workload (${totalPts} pts) before PTO \u2014 have they handed off?${statusNote}`, tasks: theirTasks };
    if (theirTasks.length) return { text: `Has ${name} handed off their ${theirTasks.length} task${theirTasks.length > 1 ? 's' : ''}?${statusNote}`, tasks: theirTasks };
    return { text: `Need anything from ${name} before they\u2019re out?${statusNote}`, tasks: [] };
  }

  if (item.type === 'review' || item.type === 'shoot' || item.type === 'milestone') {
    const proj = (state.projects || []).find(p => p.id === item.projectId);
    if (!proj) return null;
    const eventName = (item.title || '').toLowerCase();

    // Find tasks on this project in the window that come before the event
    const leadingTasks = (proj.tasks || []).filter(t => {
      if (t.isDueDate || t.isReview) return false;
      const end = t.endDate || t.date;
      return end >= afterDate && t.date < item.date;
    });

    // Status modifier
    const behindNote = isBehind ? ' You\u2019ve marked this project behind \u2014 flag early if anything\u2019s at risk.' : '';
    const aheadNote = isAhead ? ' You\u2019re ahead on this one.' : '';
    const statusNote = behindNote || aheadNote;

    // Try keyword matching
    const stopWords = new Set(['the','and','for','with','this','that','from','into','kick','off','final','date','due']);
    const eventWords = eventName.split(/[\s·\-—:,]+/).filter(w => w.length > 2 && !stopWords.has(w)).map(w => w.toLowerCase());
    const matched = leadingTasks.filter(t => {
      const tn = (t.taskName || '').toLowerCase();
      return eventWords.some(w => tn.includes(w));
    });

    if (matched.length) {
      if (matched.length === 1) {
        const taskName = matched[0].taskName || '(untitled)';
        return { text: `Will \u201c${taskName}\u201d be ready for this?${statusNote}`, tasks: leadingTasks };
      }
      return { text: `${matched.length} related tasks need to land before this \u2014 on track?${statusNote}`, tasks: leadingTasks };
    }
    if (leadingTasks.length) {
      return { text: `${leadingTasks.length} task${leadingTasks.length > 1 ? 's' : ''} due before this \u2014 everything on track?${statusNote}`, tasks: leadingTasks };
    }
    if (item.type === 'shoot') return { text: `Is everything prepped for the shoot?${statusNote}`, tasks: [] };
    if (item.type === 'milestone') return { text: `Is everything ready for this?${statusNote}`, tasks: [] };
    return { text: `Is everything ready for review?${statusNote}`, tasks: [] };
  }

  return null;
}

function renderHeadsUpSection() {
  const items = getHeadsUpItems(selectedPerson, selectedDate);
  if (!items.length) return null;

  const section = document.createElement('div');
  section.className = 'dash-section';

  const title = document.createElement('div');
  title.className = 'dash-section-title';
  title.textContent = 'Heads Up';
  section.appendChild(title);

  const list = document.createElement('div');
  list.className = 'headsup-list';

  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'headsup-item ' + item.type;

    const icon = document.createElement('span');
    icon.className = 'headsup-icon';
    icon.textContent = item.icon;
    row.appendChild(icon);

    const body = document.createElement('div');
    body.className = 'headsup-body';

    // Consolidated "Currently Out" card — renders people list, no prompt
    if (item.consolidated && item.outPeople) {
      const titleDiv = document.createElement('div');
      titleDiv.className = 'headsup-title';
      titleDiv.textContent = item.title;
      body.appendChild(titleDiv);

      const peopleList = document.createElement('div');
      peopleList.className = 'headsup-meta';
      peopleList.style.marginTop = '4px';
      peopleList.style.lineHeight = '1.6';
      peopleList.innerHTML = item.outPeople.map(p => {
        const back = fmtDateShort(addDays(p.endDate, 1));
        return `<div>\u{1F3D6} <strong style="color:var(--text)">${esc(p.name)}</strong> \u00b7 back ${esc(back)}</div>`;
      }).join('');
      body.appendChild(peopleList);

      row.appendChild(body);
      list.appendChild(row);
      return; // skip the rest of this iteration
    }

    let dateText = fmtDateShort(item.date);
    if (item.endDate) dateText += ' \u2013 ' + fmtDateShort(item.endDate);

    // Title — clickable to open project in team.html
    const titleDiv = document.createElement('div');
    titleDiv.className = 'headsup-title';
    if (item.projectId) {
      const link = document.createElement('a');
      link.href = 'team.html#project=' + encodeURIComponent(item.projectId);
      link.target = '_blank';
      link.textContent = item.title;
      titleDiv.appendChild(link);
    } else {
      titleDiv.textContent = item.title;
    }
    body.appendChild(titleDiv);

    const dateDiv = document.createElement('div');
    dateDiv.className = 'headsup-date';
    dateDiv.textContent = dateText;
    body.appendChild(dateDiv);

    const metaDiv = document.createElement('div');
    metaDiv.className = 'headsup-meta';
    metaDiv.textContent = item.project;
    body.appendChild(metaDiv);

    // Prompt — clickable to expand task list
    const promptData = getHeadsUpPrompt(item, selectedPerson, selectedDate);
    if (promptData) {
      const promptDiv = document.createElement('div');
      promptDiv.className = 'headsup-prompt' + (promptData.tasks.length ? ' headsup-prompt-clickable' : '');
      promptDiv.textContent = promptData.text;

      if (promptData.tasks.length) {
        let expanded = false;
        const tasksDiv = document.createElement('div');
        tasksDiv.className = 'headsup-tasks';
        tasksDiv.style.display = 'none';

        promptData.tasks.forEach(t => {
          const ti = document.createElement('div');
          ti.className = 'headsup-task-item';
          const loe = t.loe ? (LOE_EMOJI[t.loe] || '') + ' ' : '';
          const person = t.person ? ` \u00b7 ${esc(t.person)}` : '';
          ti.innerHTML = `<span style="flex:1">${loe}${esc(t.taskName || '(untitled)')}</span><span class="headsup-task-person">${esc(t.person || '')}</span>`;
          tasksDiv.appendChild(ti);
        });

        promptDiv.addEventListener('click', () => {
          expanded = !expanded;
          tasksDiv.style.display = expanded ? '' : 'none';
        });

        body.appendChild(promptDiv);
        body.appendChild(tasksDiv);
      } else {
        body.appendChild(promptDiv);
      }
    }

    row.appendChild(body);
    list.appendChild(row);
  });

  section.appendChild(list);
  return section;
}

// ── COMING UP — GANTT CHART (5 business days for selected person) ──
function renderComingUpSection() {
  const section = document.createElement('div');
  section.className = 'dash-section';

  const title = document.createElement('div');
  title.className = 'dash-section-title';
  title.textContent = 'Next 5 Days';
  section.appendChild(title);

  const days = [];
  let cursor = selectedDate;
  while (days.length < 5) {
    if (!isWeekend(cursor)) days.push(cursor);
    cursor = addDays(cursor, 1);
  }
  const windowStart = days[0];
  const windowEnd = days[days.length - 1];
  const today = todayStr();
  const lp = (selectedPerson || '').toLowerCase();

  // Collect tasks for this person that overlap the visible window
  const items = [];
  (state.projects || []).filter(p => !p.completed && !p.ghost).forEach(proj => {
    (proj.tasks || []).forEach(task => {
      const start = task.date;
      const end = task.endDate || task.date;
      if (!start) return;
      if (end < windowStart || start > windowEnd) return;

      let isMatch = false;
      let matchRole = null;
      if (task.person === selectedPerson) {
        isMatch = true;
        matchRole = task.role;
      }
      if (task.attendees) {
        task.attendees.forEach(a => {
          if (a.person === selectedPerson) {
            isMatch = true;
            if (!matchRole) matchRole = a.role;
          }
        });
      }
      if (task.isDueDate && task.milestoneType === 'pto') {
        if ((task.attendees || []).some(a => a.person && a.person.toLowerCase() === lp)) isMatch = true;
        if (task.taskName && task.taskName.toLowerCase().includes(lp)) isMatch = true;
      }
      if (!isMatch) return;

      // Find first/last visible day index the task overlaps
      let startIdx = -1, endIdx = -1;
      for (let i = 0; i < days.length; i++) {
        if (days[i] >= start && days[i] <= end) {
          if (startIdx < 0) startIdx = i;
          endIdx = i;
        }
      }
      if (startIdx < 0) return; // task fell entirely on weekends within window

      items.push({
        task, startIdx, endIdx,
        clippedLeft: start < windowStart,
        clippedRight: end > windowEnd,
        projectName: proj.name,
        projectId: proj.id,
        color: getRoleColor(matchRole || task.role)
      });
    });
  });

  if (!items.length) {
    const empty = document.createElement('div');
    empty.className = 'gantt-empty';
    empty.textContent = 'Nothing scheduled in the next 5 business days';
    section.appendChild(empty);
    return section;
  }

  // Sort: earliest start, then longest, then project name
  items.sort((a, b) =>
    a.startIdx - b.startIdx
    || (b.endIdx - b.startIdx) - (a.endIdx - a.startIdx)
    || a.projectName.localeCompare(b.projectName)
  );

  const chart = document.createElement('div');
  chart.className = 'gantt-chart';

  // Header row
  const headerRow = document.createElement('div');
  headerRow.className = 'gantt-row gantt-header-row';
  const headerLabel = document.createElement('div');
  headerLabel.className = 'gantt-label';
  headerRow.appendChild(headerLabel);
  const headerCells = document.createElement('div');
  headerCells.className = 'gantt-cells';
  days.forEach(dayStr => {
    const dh = document.createElement('div');
    dh.className = 'gantt-day-header' + (dayStr === today ? ' today' : '');
    const d = new Date(dayStr + 'T00:00:00');
    const dow = DOW_SHORT[d.getDay()];
    const dateStr = (d.getMonth() + 1) + '/' + d.getDate();
    dh.innerHTML = `<div>${dow}</div><div class="gantt-date">${dateStr}</div>`;
    headerCells.appendChild(dh);
  });
  headerRow.appendChild(headerCells);
  chart.appendChild(headerRow);

  // Task rows
  items.forEach(({ task, startIdx, endIdx, clippedLeft, clippedRight, projectName, color }) => {
    const row = document.createElement('div');
    row.className = 'gantt-row';

    const labelCell = document.createElement('div');
    labelCell.className = 'gantt-label';
    const taskName = task.taskName || task.reviewLabel || task.role || '(untitled)';
    labelCell.innerHTML = `<div class="gantt-task-name">${esc(taskName)}</div><div class="gantt-task-project">${esc(projectName)}</div>`;
    row.appendChild(labelCell);

    const cellsWrap = document.createElement('div');
    cellsWrap.className = 'gantt-cells';
    days.forEach(dayStr => {
      const cell = document.createElement('div');
      cell.className = 'gantt-cell' + (dayStr === today ? ' today' : '');
      cellsWrap.appendChild(cell);
    });

    const bar = document.createElement('div');
    let barClass = 'gantt-bar';
    if (task.isDueDate) {
      barClass += task.milestoneType === 'pto' ? ' pto' : ' milestone';
    } else if (task.isReview) {
      barClass += ' review';
    }
    if (clippedLeft) barClass += ' clipped-left';
    if (clippedRight) barClass += ' clipped-right';
    bar.className = barClass;

    const span = endIdx - startIdx + 1;
    bar.style.left = `calc(${(startIdx / days.length) * 100}% + 2px)`;
    bar.style.width = `calc(${(span / days.length) * 100}% - 4px)`;
    if (!task.isDueDate && !task.isReview) bar.style.background = color;

    const loe = (!task.isDueDate && task.loe) ? LOE_EMOJI[task.loe] || '' : '';
    const prefix = clippedLeft ? '← ' : '';
    const suffix = clippedRight ? ' →' : '';
    bar.innerHTML = (loe ? `<span>${loe}</span>` : '') + `<span class="gantt-bar-text">${prefix}${esc(taskName)}${suffix}</span>`;

    const fullStart = task.date;
    const fullEnd = task.endDate || task.date;
    const dateRange = fullStart === fullEnd ? fmtDateShort(fullStart) : `${fmtDateShort(fullStart)} – ${fmtDateShort(fullEnd)}`;
    bar.title = `${taskName} — ${projectName}\n${dateRange}`;

    cellsWrap.appendChild(bar);
    row.appendChild(cellsWrap);
    chart.appendChild(row);
  });

  section.appendChild(chart);
  return section;
}


// ── ESCAPE HTML ──
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ── DATE NAVIGATION ──
document.getElementById('btnPrevDay').addEventListener('click', () => {
  selectedDate = addDays(selectedDate, -1);
  renderAll();
});
document.getElementById('btnNextDay').addEventListener('click', () => {
  selectedDate = addDays(selectedDate, 1);
  renderAll();
});
document.getElementById('btnToday').addEventListener('click', () => {
  selectedDate = todayStr();
  renderAll();
});
document.getElementById('dateLabel').addEventListener('click', () => {
  const picker = document.getElementById('datePicker');
  picker.value = selectedDate;
  picker.showPicker();
});
document.getElementById('datePicker').addEventListener('change', (e) => {
  if (e.target.value) {
    selectedDate = e.target.value;
    renderAll();
  }
});

// ── SEARCH ──
document.getElementById('personSearch').addEventListener('input', (e) => {
  searchFilter = e.target.value;
  renderSidebar();
});

// ── INIT ──
renderAll();
</script>
