<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRE-PRO — Dashboard</title>

<!-- Firebase + auth gate -->
<script type="module" src="./auth.js"></script>
<script type="module">
window._fbReady.then(({ db, ref, onValue }) => {
  onValue(ref(db, 'prepro/state'), snapshot => {
    const data = snapshot.val();
    if (!data || !Array.isArray(data.projects)) return;
    window._fbState = data;
    if (window._dashReloadState) window._dashReloadState(data);
  }, err => console.error('dash firebase error:', err));

  onValue(ref(db, 'prepro/dash'), snapshot => {
    // Skip the echo of our own writes — local state is already current and
    // re-rendering would tear down any input the user just opened.
    if (window._fbSuppressDashEcho > 0) { window._fbSuppressDashEcho--; return; }
    const data = snapshot.val();
    if (data) { window._fbDashData = data; if (window._dashReloadDashData) window._dashReloadDashData(data); }
  }, err => console.error('dash meta firebase error:', err));

  onValue(ref(db, 'prepro/nameHistory'), snapshot => {
    const data = snapshot.val();
    if (data) { window._fbNameHistory = data; if (window._dashReloadNameHistory) window._dashReloadNameHistory(data); }
  }, err => console.error('dash nameHistory firebase error:', err));

  onValue(ref(db, 'prepro/peopleEmails'), snapshot => {
    const data = snapshot.val();
    if (data) { window._fbPeopleEmails = data; if (window._dashReloadPeopleEmails) window._dashReloadPeopleEmails(data); }
  }, err => console.error('dash peopleEmails firebase error:', err));
});
</script>

<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font: inherit; cursor: pointer; border: none; background: none; }
input  { font: inherit; }

/* ── VARIABLES ── */
:root {
  --bg:        #0d0d12;
  --panel:     #16161e;
  --card:      #1e1e28;
  --border:    #2c2c3e;
  --text:      #e0e0ec;
  --dim:       #8080a0;
  --accent:    #6c63ff;
  --danger:    #e05555;
  --cat-internal: #4a90d9;
  --cat-external: #e07b39;
  --cat-vendor:   #7c5cbf;
  --cat-other:    #4cba6a;
}

/* ── BASE ── */
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 13px; overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── HEADER ── */
.dash-header { display: flex; align-items: center; gap: 14px; padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.dash-title { font-size: 13px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); }
.dash-subtitle { font-size: 11px; color: var(--dim); }
.dash-spacer { flex: 1; }

/* ── DATE NAV ── */
.date-nav { display: flex; align-items: center; gap: 6px; }
.date-nav-btn { font-size: 14px; font-weight: 700; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; user-select: none; }
.date-nav-btn:hover { color: var(--text); border-color: var(--dim); }
.date-nav-label { font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; min-width: 140px; text-align: center; }
.date-nav-label:hover { color: var(--accent); }
.btn-today { font-size: 11px; font-weight: 600; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; }
.btn-today:hover { color: var(--text); }
#datePicker { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }

/* ── LAYOUT ── */
.dash-layout { display: grid; grid-template-columns: 220px 1fr; flex: 1; min-height: 0; }

/* ── SIDEBAR ── */
.dash-sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.dash-sidebar-head { padding: 8px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.data-migration { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
.data-mig-btn { flex: 1; font-size: 10px; font-weight: 600; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 5px 4px; cursor: pointer; transition: color .15s, border-color .15s; text-align: center; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
.data-mig-btn:hover { color: var(--text); border-color: var(--accent); }
.dash-search { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 5px 8px; font-size: 12px; outline: none; }
.dash-search:focus { border-color: var(--accent); }
.dash-search::placeholder { color: var(--dim); }
.dash-people { flex: 1; overflow-y: auto; padding: 6px 0; }
.dash-person { display: flex; flex-direction: column; gap: 1px; padding: 6px 10px; cursor: pointer; border-radius: 5px; margin: 1px 6px; user-select: none; transition: background .1s; }
.dash-person:hover { background: var(--card); }
.dash-person.active { background: var(--accent); }
.dash-person-name { font-size: 13px; font-weight: 600; }
.dash-person.active .dash-person-name { color: #fff; }
.dash-person-roles { font-size: 10px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dash-person.active .dash-person-roles { color: rgba(255,255,255,.7); }

/* ── MAIN ── */
.dash-main { overflow-y: auto; padding: 20px 28px 40px; }
.dash-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--dim); font-size: 14px; }

/* ── STATUS CONTROL (per-project) ── */
.status-seg { display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; margin-left: auto; flex-shrink: 0; }
.status-seg-btn { font-size: 9px; font-weight: 600; padding: 2px 8px; color: var(--dim); background: var(--bg); border: none; cursor: pointer; transition: all .15s; border-right: 1px solid var(--border); }
.status-seg-btn:last-child { border-right: none; }
.status-seg-btn:hover { color: var(--text); }
.status-seg-btn.active-behind { background: rgba(192,57,79,.2); color: #e07070; }
.status-seg-btn.active-on { background: rgba(76,186,106,.2); color: #4cba6a; }
.status-seg-btn.active-ahead { background: rgba(74,144,217,.2); color: #4a90d9; }

/* ── EFFORT BAR ── */
.effort-bar { display: flex; gap: 4px; margin-bottom: 20px; }
.effort-day { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 4px; text-align: center; min-width: 0; }
.effort-day.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.effort-day-label { font-size: 9px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
.effort-day-score { font-size: 14px; font-weight: 700; }

/* ── SECTIONS ── */
.dash-section { margin-bottom: 24px; }
.dash-section-title { font-size: 10px; font-weight: 700; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }

/* ── TODAY HERO ── */
.today-hero { margin-bottom: 28px; min-height: 200px; }
.today-date-heading { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 16px; letter-spacing: -.02em; }
.today-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
.today-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.today-card-project { font-size: 14px; font-weight: 700; color: var(--text); text-decoration: none; }
a.today-card-project:hover { color: var(--accent); }
.role-tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 10px; color: #fff; white-space: nowrap; }
.today-task-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
.today-task-block + .today-task-block { border-top: 1px solid var(--border); }
.today-task-row.completed { opacity: .35; }
.today-task-row.completed .task-name { text-decoration: line-through; }
.task-suggestion { font-size: 11px; color: var(--accent); background: rgba(108,99,255,.08); border-left: 2px solid var(--accent); padding: 6px 10px 6px 8px; margin: 2px 0 4px 26px; border-radius: 0 6px 6px 0; line-height: 1.55; }
.task-suggestion .ts-icon { margin-right: 4px; }
.task-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--dim); background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; transition: all .15s; padding: 0; }
.task-check:hover { border-color: var(--accent); }
.task-check.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
.task-name { flex: 1; }
.task-loe { flex-shrink: 0; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background .15s; user-select: none; font-size: 14px; }
.task-loe:hover { background: rgba(255,255,255,.1); }
.task-badge { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 8px; background: rgba(192,57,79,.2); color: #e07070; white-space: nowrap; }
.task-days { font-size: 10px; color: var(--dim); flex-shrink: 0; }
/* ── SUBTASKS ── */
.subtask-area { padding-left: 26px; padding-bottom: 4px; }
.subtask-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; }
.subtask-check { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: transparent; transition: all .15s; padding: 0; }
.subtask-check:hover { border-color: var(--accent); }
.subtask-check.checked { background: var(--accent); border-color: var(--accent); color: #fff; }
.subtask-text { flex: 1; color: var(--text); }
.subtask-text.done { text-decoration: line-through; opacity: .4; }
.subtask-del { font-size: 11px; color: var(--dim); cursor: pointer; opacity: 0; transition: opacity .15s; padding: 0 2px; }
.subtask-row:hover .subtask-del { opacity: 1; }
.subtask-del:hover { color: var(--danger); }
.subtask-add-btn { font-size: 11px; color: var(--dim); cursor: pointer; padding: 2px 0; display: inline-flex; align-items: center; gap: 4px; transition: color .15s; background: none; border: none; }
.subtask-add-btn:hover { color: var(--accent); }
.subtask-input { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 3px 6px; font-size: 11px; outline: none; flex: 1; }
.subtask-input:focus { border-color: var(--accent); }
.subtask-input-row { display: flex; gap: 4px; padding: 3px 0; }

/* ── TASK NOTE BUTTON ── */
.task-note-btn { font-size: 11px; color: var(--dim); cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: all .15s; user-select: none; flex-shrink: 0; background: none; border: none; opacity: 0; }
.today-task-row:hover .task-note-btn { opacity: 1; }
.task-note-btn:hover { color: var(--accent); background: rgba(255,255,255,.06); }

/* ── NOTE COMPOSE OVERLAY ── */
.note-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: flex; align-items: center; justify-content: center; }
.note-modal { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; width: 380px; max-width: 90vw; }
.note-modal-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.note-modal-types { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.note-modal-type-btn { font-size: 10px; font-weight: 600; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; cursor: pointer; transition: all .15s; }
.note-modal-type-btn:hover { color: var(--text); border-color: var(--accent); }
.note-modal-type-btn.active { background: rgba(108,99,255,.18); color: var(--accent); border-color: var(--accent); }
.note-modal textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 6px 8px; font: inherit; font-size: 12px; resize: vertical; min-height: 60px; outline: none; box-sizing: border-box; }
.note-modal textarea:focus { border-color: var(--accent); }
.note-modal-actions { display: flex; gap: 6px; margin-top: 8px; }
.note-modal .btn { padding: 5px 14px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; }
.note-modal .btn-primary { background: var(--accent); color: #fff; }
.note-modal .btn-ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }

.no-tasks { color: var(--dim); font-size: 14px; font-style: italic; padding: 24px 0; }

/* ── HEADS UP ── */
.headsup-list { display: flex; flex-direction: column; gap: 6px; }
.headsup-item { display: flex; align-items: flex-start; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; }
.headsup-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.headsup-body { flex: 1; min-width: 0; }
.headsup-title { font-weight: 600; }
.headsup-date { font-size: 10px; color: var(--dim); margin-top: 1px; }
.headsup-meta { font-size: 10px; color: var(--dim); margin-top: 1px; }
.headsup-item.pto { border-color: rgba(255,180,50,.25); }
.headsup-item.pto .headsup-icon { opacity: .8; }
.headsup-item.review { border-color: rgba(192,57,79,.3); }
.headsup-item.shoot { border-color: rgba(192,57,79,.4); }
.headsup-item.milestone { border-color: rgba(108,99,255,.3); }
.headsup-title a { color: var(--text); text-decoration: none; }
.headsup-title a:hover { color: var(--accent); text-decoration: underline; }
.headsup-prompt { font-size: 11px; color: var(--dim); font-style: italic; margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border); }
.headsup-prompt-clickable { cursor: pointer; }
.headsup-prompt-clickable:hover { color: var(--text); }
.headsup-tasks { margin-top: 4px; padding: 4px 0 0; font-style: normal; }
.headsup-task-item { font-size: 11px; color: var(--text); padding: 2px 0; display: flex; align-items: center; gap: 6px; }
.headsup-task-item + .headsup-task-item { border-top: 1px solid var(--border); }
.headsup-task-person { font-size: 9px; color: var(--dim); }
.headsup-task-loe { flex-shrink: 0; }

/* ── COMING UP CARDS ── */
.coming-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.coming-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; min-height: 70px; }
.coming-card.free { opacity: .45; }
.coming-card-date { font-size: 11px; font-weight: 700; color: var(--dim); margin-bottom: 6px; }
.coming-card-task { font-size: 12px; padding: 4px 0; }
.coming-card-task + .coming-card-task { border-top: 1px solid var(--border); }
.coming-card-task-row { display: flex; align-items: center; gap: 6px; }
.coming-card-task-row .task-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.coming-card-project { font-size: 9px; color: var(--dim); margin-top: 1px; }
.coming-card-free { font-size: 12px; color: var(--dim); font-style: italic; }

/* ── GANTT CHART ── */
.gantt-chart { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--card); }
.gantt-row { display: grid; grid-template-columns: 200px 1fr; min-height: 40px; }
.gantt-row + .gantt-row { border-top: 1px solid var(--border); }
.gantt-row.gantt-header-row { background: var(--bg); min-height: 36px; }
.gantt-label { padding: 6px 10px; font-size: 11px; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
.gantt-task-name { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-task-project { font-size: 9px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.gantt-cells { position: relative; display: grid; grid-template-columns: repeat(5, 1fr); }
.gantt-cell { border-right: 1px solid var(--border); }
.gantt-cell:last-child { border-right: none; }
.gantt-cell.today { background: rgba(108,99,255,.08); }
.gantt-day-header { padding: 6px 4px; text-align: center; font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; border-right: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; gap: 1px; }
.gantt-day-header:last-child { border-right: none; }
.gantt-day-header.today { color: var(--accent); background: rgba(108,99,255,.08); }
.gantt-day-header .gantt-date { font-size: 10px; font-weight: 600; color: var(--text); }
.gantt-day-header.today .gantt-date { color: var(--accent); }
.gantt-bar { position: absolute; top: 5px; bottom: 5px; padding: 0 8px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 5px; overflow: hidden; white-space: nowrap; box-shadow: 0 1px 2px rgba(0,0,0,.35); cursor: default; }
.gantt-bar-text { overflow: hidden; text-overflow: ellipsis; }
.gantt-bar.milestone { background: #c0394f !important; }
.gantt-bar.pto { background: #c8923a !important; }
.gantt-bar.review { background: #c0394f !important; }
.gantt-bar.clipped-left { border-top-left-radius: 0; border-bottom-left-radius: 0; }
.gantt-bar.clipped-right { border-top-right-radius: 0; border-bottom-right-radius: 0; }
.gantt-empty { padding: 24px; text-align: center; color: var(--dim); font-style: italic; font-size: 12px; }

/* ── SETTINGS MODAL ── */
.settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 9999; display: flex; align-items: center; justify-content: center; }
.settings-modal { width: min(820px, 95vw); max-height: 85vh; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.5); }
.settings-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.settings-title { font-weight: 700; font-size: 14px; color: var(--text); }
.settings-close { background: transparent; color: var(--dim); border: none; font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
.settings-close:hover { color: var(--text); background: rgba(255,255,255,.06); }
.settings-body { display: flex; flex-direction: column; min-height: 0; flex: 1; }
.settings-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--panel); }
.settings-tab { padding: 9px 18px; font-size: 12px; font-weight: 600; color: var(--dim); cursor: pointer; border-bottom: 2px solid transparent; user-select: none; }
.settings-tab:hover { color: var(--text); }
.settings-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.settings-content { padding: 16px; overflow-y: auto; flex: 1; min-height: 240px; }
.settings-btn { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-weight: 600; margin-right: 8px; transition: border-color .15s, color .15s; }
.settings-btn:hover { border-color: var(--accent); }
.settings-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.settings-section-title { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; margin: 0 0 10px; font-weight: 700; }
.settings-hint { font-size: 11px; color: var(--dim); margin: 6px 0 14px; line-height: 1.5; }
.people-list { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.people-row { display: grid; grid-template-columns: 140px 1fr 200px 28px; gap: 10px; align-items: center; padding: 7px 10px; border-bottom: 1px solid var(--border); background: var(--card); }
.people-row:last-child { border-bottom: none; }
.people-row .pname { font-weight: 600; color: var(--text); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.people-row input.pemail { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 5px 8px; color: var(--text); font-size: 12px; outline: none; width: 100%; transition: border-color .15s; }
.people-row input.pemail:focus { border-color: var(--accent); }
.people-row .proles { font-size: 10px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.people-row .pdel { background: transparent; color: var(--dim); border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
.people-row .pdel:hover { color: #e07070; background: rgba(224,112,112,.08); }
.people-empty { padding: 20px; color: var(--dim); text-align: center; font-size: 12px; background: var(--card); border-radius: 6px; border: 1px dashed var(--border); }
.people-add { display: grid; grid-template-columns: 140px 1fr 160px auto; gap: 8px; margin-top: 14px; }
.people-add input, .people-add select { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px; color: var(--text); font-size: 12px; outline: none; transition: border-color .15s; }
.people-add input:focus, .people-add select:focus { border-color: var(--accent); }
.people-merge { margin-top: 18px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; }
.people-merge-title { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; font-weight: 700; }
.people-merge-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.people-merge select { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px; color: var(--text); font-size: 12px; outline: none; flex: 1; min-width: 120px; }
.people-merge-arrow { color: var(--dim); font-size: 13px; }
.data-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
</style>
</head>

<body>

<!-- ── HEADER ── -->
<header class="dash-header">
  <span class="dash-title">PRE-PRO</span>
  <span class="dash-subtitle">Dashboard</span>
  <div style="width: 16px;"></div>
  <div class="date-nav">
    <button class="date-nav-btn" id="btnPrevDay" title="Previous day">&#8249;</button>
    <span class="date-nav-label" id="dateLabel" title="Click to pick a date"></span>
    <button class="date-nav-btn" id="btnNextDay" title="Next day">&#8250;</button>
    <button class="btn-today" id="btnToday">Today</button>
    <input type="date" id="datePicker">
  </div>
  <div class="dash-spacer"></div>
</header>

<!-- SETTINGS MODAL -->
<div class="settings-overlay" id="settingsOverlay" style="display:none;">
  <div class="settings-modal" id="settingsModal">
    <div class="settings-header">
      <span class="settings-title">⚙ Settings</span>
      <button class="settings-close" id="settingsClose" title="Close">✕</button>
    </div>
    <div class="settings-body">
      <div class="settings-tabs">
        <div class="settings-tab active" data-settings-tab="data">Data</div>
        <div class="settings-tab" data-settings-tab="people">People</div>
      </div>
      <div class="settings-content" id="settingsContent"></div>
    </div>
  </div>
  <input type="file" id="importFileInput" accept=".json" style="display:none">
</div>

<!-- ── BODY ── -->
<div class="dash-layout">
  <!-- Sidebar -->
  <aside class="dash-sidebar">
    <div class="dash-sidebar-head">
      <input type="text" class="dash-search" id="personSearch" placeholder="Search people...">
    </div>
    <div class="dash-people" id="peopleList"></div>
    <div class="data-migration">
      <a href="guide.html" target="_blank" class="data-mig-btn" title="Open guide">❓ Help</a>
      <a href="team.html" class="data-mig-btn" title="Projects & scheduler">📁 Projects</a>
      <a href="ops.html" class="data-mig-btn" title="Ops mode — team workload view">📊 Ops</a>
      <button class="data-mig-btn" id="btnSettings" title="Settings: import/export data, manage people">⚙ Settings</button>
    </div>
  </aside>
  <!-- Main -->
  <main class="dash-main" id="dashMain">
    <div class="dash-empty" id="emptyState">Select a person from the sidebar</div>
  </main>
</div>

<script>
'use strict';

// ── CONSTANTS ──
const ROLE_CATS = [
  { label: 'Internal Team', color: '#4a90d9', roles: ['Producer', 'Editor', 'Animator'] },
  { label: 'External',      color: '#e07b39', roles: ['Copywriter', 'Designer', 'Stakeholder'] },
  { label: 'Vendors',       color: '#7c5cbf', roles: ['External Vendor'] },
  { label: 'Other',         color: '#4cba6a', roles: ['Other'] }
];
const LOE_EMOJI = { low: '\u{1F7E2}', medium: '\u{1F7E1}', high: '\u{1F534}' };
const LOE_PTS   = { low: 1, medium: 2, high: 3 };
const DOW_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const NOTE_TYPES = [
  { key: 'update',    label: 'Project Update',        emoji: '\u{1F4CB}', desc: 'General status update' },
  { key: 'delay',     label: 'Project Delay',          emoji: '\u{23F3}',  desc: 'Something is behind schedule' },
  { key: 'direction', label: 'Change in Direction',     emoji: '\u{1F500}', desc: 'Scope, creative, or strategy shift' },
  { key: 'feedback',  label: 'Stakeholder Feedback',    emoji: '\u{1F4AC}', desc: 'Feedback from a stakeholder or client' },
  { key: 'blocker',   label: 'Blocker',                 emoji: '\u{1F6A7}', desc: 'Something is blocking progress' },
  { key: 'decision',  label: 'Decision Made',           emoji: '\u{2705}',  desc: 'Key decision logged for the record' },
  { key: 'team',      label: 'Team Change',             emoji: '\u{1F465}', desc: 'Staffing, reassignment, availability' }
];

// ── STATE ──
let state = { projects: [] };
let dashData = { completions: {}, subtasks: {}, status: {} };
let selectedPerson = localStorage.getItem('dash_selected_person') || null;
let selectedDate   = todayStr();
let searchFilter   = '';
let pendingAddSubtaskFor = null;

// ── DATA LOADING ──
function loadState() {
  try { const r = localStorage.getItem('prepro_data'); if (r) state = JSON.parse(r); } catch(e) {}
  if (!state || !state.projects) state = { projects: [] };
}
function loadDashData() {
  try { const r = localStorage.getItem('dash_data'); if (r) dashData = JSON.parse(r); } catch(e) {}
  if (!dashData) dashData = {};
  if (!dashData.completions) dashData.completions = {};
  if (!dashData.subtasks) dashData.subtasks = {};
  if (!dashData.status) dashData.status = {};
}

// ── NAME HISTORY & PEOPLE EMAILS (synced via Firebase) ──
let nameHistory = {};
let peopleEmails = {};

function saveNameHistory() {
  if (!window._fb) return;
  const { db, ref, set } = window._fb;
  set(ref(db, 'prepro/nameHistory'), nameHistory).catch(err => console.error('saveNameHistory:', err));
}
function savePeopleEmails() {
  if (!window._fb) return;
  const { db, ref, set } = window._fb;
  set(ref(db, 'prepro/peopleEmails'), peopleEmails).catch(err => console.error('savePeopleEmails:', err));
}
function setPersonEmail(name, email) {
  const clean = (email || '').trim();
  if (clean) peopleEmails[name] = clean;
  else delete peopleEmails[name];
  savePeopleEmails();
}
function getPersonEmail(name) { return peopleEmails[name] || ''; }

window._dashReloadNameHistory = function(data) {
  if (data && typeof data === 'object') nameHistory = data;
  if (document.getElementById('settingsOverlay') && document.getElementById('settingsOverlay').style.display === 'flex') renderSettingsContent();
};
window._dashReloadPeopleEmails = function(data) {
  if (data && typeof data === 'object') peopleEmails = data;
  if (document.getElementById('settingsOverlay') && document.getElementById('settingsOverlay').style.display === 'flex') renderSettingsContent();
};

function collectAllPeople() {
  const people = {};
  const touch = (name, role) => {
    if (!name) return;
    if (!people[name]) people[name] = { name, email: peopleEmails[name] || '', roles: new Set() };
    if (role) people[name].roles.add(role);
  };
  Object.entries(nameHistory || {}).forEach(([role, names]) => (names || []).forEach(n => touch(n, role)));
  (state.projects || []).forEach(p => {
    const roster = p.roster || {};
    Object.entries(roster).forEach(([role, names]) => (names || []).forEach(n => touch(n, role)));
  });
  Object.keys(peopleEmails || {}).forEach(n => touch(n, null));
  return Object.values(people).sort((a,b) => a.name.localeCompare(b.name));
}

function deletePersonEverywhere(name) {
  Object.keys(nameHistory || {}).forEach(role => {
    nameHistory[role] = (nameHistory[role] || []).filter(n => n !== name);
  });
  (state.projects || []).forEach(p => {
    const roster = p.roster || {};
    Object.keys(roster).forEach(role => {
      roster[role] = (roster[role] || []).filter(n => n !== name);
    });
    (p.tasks || []).forEach(t => {
      if (t.person === name) t.person = '';
      if (Array.isArray(t.attendees)) t.attendees = t.attendees.filter(a => a.person !== name);
    });
  });
  delete peopleEmails[name];
  saveNameHistory();
  savePeopleEmails();
  saveState();
}

function mergePersonInto(from, into) {
  if (!from || !into || from === into) return;
  Object.keys(nameHistory || {}).forEach(role => {
    const list = nameHistory[role] || [];
    if (list.includes(from)) {
      nameHistory[role] = list.filter(n => n !== from);
      if (!nameHistory[role].includes(into)) nameHistory[role].push(into);
    }
  });
  (state.projects || []).forEach(p => {
    const roster = p.roster || {};
    Object.keys(roster).forEach(role => {
      const list = roster[role] || [];
      if (list.includes(from)) {
        roster[role] = list.filter(n => n !== from);
        if (!roster[role].includes(into)) roster[role].push(into);
      }
    });
    (p.tasks || []).forEach(t => {
      if (t.person === from) t.person = into;
      if (Array.isArray(t.attendees)) {
        t.attendees.forEach(a => { if (a.person === from) a.person = into; });
        const seen = new Set();
        t.attendees = t.attendees.filter(a => {
          const k = a.person + '|' + (a.role || '');
          if (seen.has(k)) return false;
          seen.add(k); return true;
        });
      }
    });
  });
  if (!peopleEmails[into] && peopleEmails[from]) peopleEmails[into] = peopleEmails[from];
  delete peopleEmails[from];
  saveNameHistory();
  savePeopleEmails();
  saveState();
}

// ── SETTINGS MODAL ──
let settingsActiveTab = 'data';

function openSettings(tab) {
  settingsActiveTab = tab || 'data';
  document.querySelectorAll('.settings-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.settingsTab === settingsActiveTab);
  });
  document.getElementById('settingsOverlay').style.display = 'flex';
  renderSettingsContent();
}
function closeSettings() {
  document.getElementById('settingsOverlay').style.display = 'none';
}

function renderSettingsContent() {
  const c = document.getElementById('settingsContent');
  if (!c) return;
  c.innerHTML = '';
  if (settingsActiveTab === 'data') renderDataSettings(c);
  else if (settingsActiveTab === 'people') renderPeopleSettings(c);
}

function renderDataSettings(c) {
  const title = document.createElement('div');
  title.className = 'settings-section-title';
  title.textContent = 'Backup & Restore';
  c.appendChild(title);

  const actions = document.createElement('div');
  actions.className = 'data-actions';
  const expBtn = document.createElement('button');
  expBtn.className = 'settings-btn primary';
  expBtn.textContent = '⬇ Export Data';
  expBtn.addEventListener('click', doExportData);
  const impBtn = document.createElement('button');
  impBtn.className = 'settings-btn';
  impBtn.textContent = '⬆ Import Data';
  impBtn.addEventListener('click', () => {
    if (!confirm('Importing will merge projects from the file into your current data.\n\nProjects with the same ID will be overwritten. Continue?')) return;
    document.getElementById('importFileInput').click();
  });
  actions.appendChild(expBtn);
  actions.appendChild(impBtn);
  c.appendChild(actions);

  const hint = document.createElement('div');
  hint.className = 'settings-hint';
  hint.textContent = 'Export downloads a JSON backup of every project, name history, and saved emails. Import merges projects by ID (overwrites duplicates) and adds new names/emails.';
  c.appendChild(hint);
}

function doExportData() {
  const payload = {
    version: 2,
    exported: new Date().toISOString(),
    prepro_data: JSON.stringify(state),
    prepro_name_history: JSON.stringify(nameHistory),
    prepro_people_emails: JSON.stringify(peopleEmails)
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'prepro-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function handleImportFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      const rawData    = payload.prepro_data    || (payload.projects ? JSON.stringify(payload) : null);
      const rawHistory = payload.prepro_name_history || null;
      const rawEmails  = payload.prepro_people_emails || null;
      if (!rawData) { alert('File doesn\'t look like a PRE-PRO backup.'); return; }

      const incoming = JSON.parse(rawData);
      if (!Array.isArray(incoming.projects)) { alert('No projects found in file.'); return; }

      const idMap = new Map((state.projects || []).map(p => [p.id, p]));
      incoming.projects.forEach(p => idMap.set(p.id, p));
      state.projects = [...idMap.values()];
      saveState();

      if (rawHistory) {
        try {
          const inHist = JSON.parse(rawHistory);
          Object.entries(inHist).forEach(([role, names]) => {
            if (!nameHistory[role]) nameHistory[role] = [];
            names.forEach(n => { if (!nameHistory[role].includes(n)) nameHistory[role].push(n); });
          });
          saveNameHistory();
        } catch(_) {}
      }
      if (rawEmails) {
        try {
          const inEmails = JSON.parse(rawEmails);
          Object.entries(inEmails).forEach(([name, email]) => {
            if (!peopleEmails[name]) peopleEmails[name] = email;
          });
          savePeopleEmails();
        } catch(_) {}
      }

      renderAll();
      renderSettingsContent();
      alert('Import complete — ' + incoming.projects.length + ' project(s) merged successfully.');
    } catch(err) {
      alert('Failed to read file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function renderPeopleSettings(c) {
  const title = document.createElement('div');
  title.className = 'settings-section-title';
  title.textContent = 'People & Emails';
  c.appendChild(title);

  const hint = document.createElement('div');
  hint.className = 'settings-hint';
  hint.textContent = 'Add an email to any person to auto-fill the To: line when exporting meetings to Outlook. Deleting a person removes them from every project roster and unassigns their tasks. Merging moves all roles, rosters, and assignments from one person to another.';
  c.appendChild(hint);

  const people = collectAllPeople();
  if (!people.length) {
    const empty = document.createElement('div');
    empty.className = 'people-empty';
    empty.textContent = 'No people yet. Add one below.';
    c.appendChild(empty);
  } else {
    const list = document.createElement('div');
    list.className = 'people-list';
    people.forEach(p => {
      const row = document.createElement('div');
      row.className = 'people-row';

      const nm = document.createElement('div');
      nm.className = 'pname';
      nm.textContent = p.name;
      nm.title = p.name;
      row.appendChild(nm);

      const emailInput = document.createElement('input');
      emailInput.className = 'pemail';
      emailInput.type = 'email';
      emailInput.placeholder = 'email@example.com';
      emailInput.value = p.email;
      emailInput.addEventListener('blur', () => setPersonEmail(p.name, emailInput.value));
      emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') emailInput.blur(); });
      row.appendChild(emailInput);

      const rolesEl = document.createElement('div');
      rolesEl.className = 'proles';
      const rolesArr = Array.from(p.roles);
      rolesEl.textContent = rolesArr.length ? rolesArr.join(', ') : '—';
      rolesEl.title = rolesEl.textContent;
      row.appendChild(rolesEl);

      const del = document.createElement('button');
      del.className = 'pdel';
      del.textContent = '✕';
      del.title = 'Delete ' + p.name + ' everywhere';
      del.addEventListener('click', () => {
        if (!confirm('Delete "' + p.name + '" from every project roster, unassign their tasks, and remove their email?\n\nThis cannot be undone.')) return;
        deletePersonEverywhere(p.name);
        renderSettingsContent();
        renderAll();
      });
      row.appendChild(del);

      list.appendChild(row);
    });
    c.appendChild(list);
  }

  const addTitle = document.createElement('div');
  addTitle.className = 'settings-section-title';
  addTitle.style.marginTop = '18px';
  addTitle.textContent = 'Add Person';
  c.appendChild(addTitle);

  const addRow = document.createElement('div');
  addRow.className = 'people-add';
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.placeholder = 'Name';
  const emailInput = document.createElement('input');
  emailInput.type = 'email';
  emailInput.placeholder = 'email@example.com (optional)';
  const roleSel = document.createElement('select');
  const defaultOpt = document.createElement('option');
  defaultOpt.value = ''; defaultOpt.textContent = 'Role (optional)';
  roleSel.appendChild(defaultOpt);
  ROLE_CATS.flatMap(cat => cat.roles).filter(r => r !== 'Other').forEach(r => {
    const o = document.createElement('option');
    o.value = r; o.textContent = r;
    roleSel.appendChild(o);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'settings-btn primary';
  addBtn.textContent = '+ Add';
  addBtn.addEventListener('click', () => {
    const n = nameInput.value.trim();
    if (!n) { nameInput.focus(); return; }
    const role = roleSel.value;
    const targetRole = role || ROLE_CATS[0].roles[0];
    if (!nameHistory[targetRole]) nameHistory[targetRole] = [];
    if (!nameHistory[targetRole].includes(n)) nameHistory[targetRole].push(n);
    saveNameHistory();
    const em = emailInput.value.trim();
    if (em) { peopleEmails[n] = em; savePeopleEmails(); }
    nameInput.value = ''; emailInput.value = ''; roleSel.value = '';
    renderSettingsContent();
  });
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
  emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
  addRow.appendChild(nameInput);
  addRow.appendChild(emailInput);
  addRow.appendChild(roleSel);
  addRow.appendChild(addBtn);
  c.appendChild(addRow);

  if (people.length >= 2) {
    const merge = document.createElement('div');
    merge.className = 'people-merge';
    const mt = document.createElement('div');
    mt.className = 'people-merge-title';
    mt.textContent = 'Merge Duplicates';
    merge.appendChild(mt);
    const mrow = document.createElement('div');
    mrow.className = 'people-merge-row';
    const fromSel = document.createElement('select');
    const intoSel = document.createElement('select');
    [fromSel, intoSel].forEach((sel, i) => {
      const def = document.createElement('option');
      def.value = ''; def.textContent = i === 0 ? 'Merge…' : 'into…';
      sel.appendChild(def);
      people.forEach(p => {
        const o = document.createElement('option');
        o.value = p.name; o.textContent = p.name;
        sel.appendChild(o);
      });
    });
    const arrow = document.createElement('span');
    arrow.className = 'people-merge-arrow';
    arrow.textContent = '→';
    const mbtn = document.createElement('button');
    mbtn.className = 'settings-btn';
    mbtn.textContent = 'Merge';
    mbtn.addEventListener('click', () => {
      const from = fromSel.value, into = intoSel.value;
      if (!from || !into) { alert('Choose both a source and a target person.'); return; }
      if (from === into) { alert('Source and target must be different.'); return; }
      if (!confirm('Merge "' + from + '" into "' + into + '"?\n\nAll roles, roster memberships, tasks, and attendee entries for "' + from + '" will be reassigned to "' + into + '".')) return;
      mergePersonInto(from, into);
      renderSettingsContent();
      renderAll();
    });
    mrow.appendChild(fromSel);
    mrow.appendChild(arrow);
    mrow.appendChild(intoSel);
    mrow.appendChild(mbtn);
    merge.appendChild(mrow);
    c.appendChild(merge);
  }
}

function wireSettingsModal() {
  const btn = document.getElementById('btnSettings');
  if (btn) btn.addEventListener('click', () => openSettings('data'));
  const closeBtn = document.getElementById('settingsClose');
  if (closeBtn) closeBtn.addEventListener('click', closeSettings);
  const overlay = document.getElementById('settingsOverlay');
  if (overlay) overlay.addEventListener('click', e => { if (e.target === overlay) closeSettings(); });
  document.querySelectorAll('.settings-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      settingsActiveTab = tab.dataset.settingsTab;
      document.querySelectorAll('.settings-tab').forEach(t => t.classList.toggle('active', t === tab));
      renderSettingsContent();
    });
  });
  const fileInput = document.getElementById('importFileInput');
  if (fileInput) {
    fileInput.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      handleImportFile(file);
      this.value = '';
    });
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('settingsOverlay').style.display === 'flex') closeSettings();
  });
}

window._dashReloadState = function(data) {
  if (data && Array.isArray(data.projects)) state = data;
  renderAll();
};
window._dashReloadDashData = function(data) {
  if (data) {
    dashData = data;
    if (!dashData.completions) dashData.completions = {};
    if (!dashData.subtasks) dashData.subtasks = {};
    if (!dashData.status) dashData.status = {};
  }
  renderAll();
};

function saveState() {
  try { localStorage.setItem('prepro_data', JSON.stringify(state)); } catch(e) {}
  if (window._fb) {
    const { db, ref, set } = window._fb;
    set(ref(db, 'prepro/state'), state).catch(e => console.error('dash firebase save error:', e));
  }
}
function saveDashData() {
  try { localStorage.setItem('dash_data', JSON.stringify(dashData)); } catch(e) {}
  if (window._fb) {
    const { db, ref, set } = window._fb;
    window._fbSuppressDashEcho = (window._fbSuppressDashEcho || 0) + 1;
    set(ref(db, 'prepro/dash'), dashData).catch(e => console.error('dash meta save error:', e));
  }
}

const LOE_CYCLE = ['low', 'medium', 'high'];
function cycleLoe(projectId, taskId) {
  const proj = (state.projects || []).find(p => p.id === projectId);
  if (!proj) return;
  const task = (proj.tasks || []).find(t => t.id === taskId);
  if (!task || task.isDueDate) return;
  const idx = LOE_CYCLE.indexOf(task.loe || 'medium');
  task.loe = LOE_CYCLE[(idx + 1) % 3];
  saveState();
  renderAll();
}

// ── ADD NOTE (to project) ──
function addNoteToProject(projectId, type, body) {
  const proj = (state.projects || []).find(p => p.id === projectId);
  if (!proj) return;
  if (!proj.notes) proj.notes = [];
  const now = new Date();
  const noteType = NOTE_TYPES.find(t => t.key === type) || NOTE_TYPES[0];
  proj.notes.push({
    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36),
    type: noteType.key,
    emoji: noteType.emoji,
    body: body,
    person: selectedPerson || 'Team',
    date: fmtDate(now.getFullYear(), now.getMonth() + 1, now.getDate()),
    time: String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0')
  });
  saveState();
}

function showNoteModal(projectId, projectName) {
  let selectedType = 'update';
  const overlay = document.createElement('div');
  overlay.className = 'note-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  const modal = document.createElement('div');
  modal.className = 'note-modal';
  modal.innerHTML = `<div class="note-modal-title">\u{1F4DD} Add Note \u2014 ${esc(projectName)}</div>`;

  const types = document.createElement('div');
  types.className = 'note-modal-types';
  NOTE_TYPES.forEach(nt => {
    const btn = document.createElement('button');
    btn.className = 'note-modal-type-btn' + (nt.key === selectedType ? ' active' : '');
    btn.textContent = nt.emoji + ' ' + nt.label;
    btn.addEventListener('click', () => {
      selectedType = nt.key;
      types.querySelectorAll('.note-modal-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    types.appendChild(btn);
  });
  modal.appendChild(types);

  const textarea = document.createElement('textarea');
  textarea.placeholder = 'Write a note...';
  textarea.rows = 3;
  modal.appendChild(textarea);

  const actions = document.createElement('div');
  actions.className = 'note-modal-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.textContent = 'Save';
  saveBtn.addEventListener('click', () => {
    if (!textarea.value.trim()) return;
    addNoteToProject(projectId, selectedType, textarea.value.trim());
    overlay.remove();
  });

  cancelBtn.textContent = 'Cancel';

  actions.appendChild(cancelBtn);

  overlay.appendChild(modal);

}

function toggleTaskDone(taskId) {

// ── SUBTASKS ──
function getSubtasks(taskId) { return dashData.subtasks[taskId] || []; }
function addSubtask(taskId, text) {
  if (!text.trim()) return;
  if (!dashData.subtasks[taskId]) dashData.subtasks[taskId] = [];
  dashData.subtasks[taskId].push({ id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36), text: text.trim(), done: false });
  saveDashData();

}
function toggleSubtask(taskId, subId) {
  const subs = dashData.subtasks[taskId];
  if (!subs) return;
  const sub = subs.find(s => s.id === subId);
  if (sub) sub.done = !sub.done;
  saveDashData();
  renderAll();
}
function removeSubtask(taskId, subId) {
  if (!dashData.subtasks[taskId]) return;
  dashData.subtasks[taskId] = dashData.subtasks[taskId].filter(s => s.id !== subId);
  if (!dashData.subtasks[taskId].length) delete dashData.subtasks[taskId];
  saveDashData();
  renderAll();
}
function editSubtask(taskId, subId, newText) {
  const subs = dashData.subtasks[taskId];
  if (!subs) return;
  const sub = subs.find(s => s.id === subId);
  if (!sub) return;
  if (newText.trim()) sub.text = newText.trim();
  saveDashData();
  renderAll();
}

// ── DATE UTILITIES ──
function fmtDate(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function todayStr() {
  const d = new Date();
  return fmtDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
}
function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return fmtDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
}
function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return fmtDate(mon.getFullYear(), mon.getMonth() + 1, mon.getDate());
}
function fmtDateLong(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}
function fmtDateShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function isWeekend(dateStr) {
  const day = new Date(dateStr + 'T00:00:00').getDay();
  return day === 0 || day === 6;
}
function getNextBusinessDays(startDate, count) {
  const days = [];
  let cursor = addDays(startDate, 1);
  while (days.length < count) {
    if (!isWeekend(cursor)) days.push(cursor);
    cursor = addDays(cursor, 1);
  }
  return days;
}
function loePts(loe) { return LOE_PTS[loe] || 2; }

function workloadInfo(pts) {
  if (pts === 0)  return { label: '\u2014',       color: '#4a4a60' };
  if (pts < 1.5)  return { label: 'Light',       color: '#4cba6a' };
  if (pts < 2.5)  return { label: 'Manageable',  color: '#9ab84c' };
  if (pts < 3.5)  return { label: 'Busy',        color: '#e07b39' };
  if (pts < 4.5)  return { label: 'Very Busy',   color: '#c0394f' };
  return            { label: 'Overloaded',     color: '#8b1a2a' };
}

const INTERNAL_ROLES = new Set(ROLE_CATS[0].roles); // Producer, Editor, Animator

// ── ROLE COLOR LOOKUP ──
function getRoleColor(role) {
  for (const cat of ROLE_CATS) {
    if (cat.roles.includes(role)) return cat.color;
  }
  return '#8080a0';
}

// ── PERSON EXTRACTION & DEDUP (internal team only) ──
function getAllPeople() {
  const personMap = new Map(); // name -> { roles: Set, projects: Map<id, {name, roles}> }

  (state.projects || []).filter(p => !p.completed && !p.ghost).forEach(proj => {
    const roster = proj.roster || {};

    // From roster — only internal team roles
    for (const [role, names] of Object.entries(roster)) {
      if (!INTERNAL_ROLES.has(role)) continue;
      (names || []).forEach(name => {
        if (!name) return;
        if (!personMap.has(name)) personMap.set(name, { roles: new Set(), projects: new Map() });
        const entry = personMap.get(name);
        entry.roles.add(role);
        if (!entry.projects.has(proj.id)) entry.projects.set(proj.id, { name: proj.name, roles: new Set(), id: proj.id });
        entry.projects.get(proj.id).roles.add(role);
      });
    }

    // From task assignments — only internal team roles
    (proj.tasks || []).forEach(t => {
      if (!t.person || t.isDueDate) return;
      if (!INTERNAL_ROLES.has(t.role)) return;
      const name = t.person;
      if (!personMap.has(name)) personMap.set(name, { roles: new Set(), projects: new Map() });
      const entry = personMap.get(name);
      if (t.role) entry.roles.add(t.role);
      if (!entry.projects.has(proj.id)) entry.projects.set(proj.id, { name: proj.name, roles: new Set(), id: proj.id });
      if (t.role) entry.projects.get(proj.id).roles.add(t.role);
    });

    // From review/event attendees — only internal team roles
    (proj.tasks || []).forEach(t => {
      if (!t.attendees) return;
      (t.attendees || []).forEach(a => {
        if (!a.person) return;
        if (!INTERNAL_ROLES.has(a.role)) return;
        const name = a.person;
        if (!personMap.has(name)) personMap.set(name, { roles: new Set(), projects: new Map() });
        const entry = personMap.get(name);
        if (a.role) entry.roles.add(a.role);
        if (!entry.projects.has(proj.id)) entry.projects.set(proj.id, { name: proj.name, roles: new Set(), id: proj.id });
        if (a.role) entry.projects.get(proj.id).roles.add(a.role);
      });
    });
  });

  return personMap;
}

// ── TASK FILTERING ──
function getTasksForPerson(personName, dateStr) {
  const results = [];
  (state.projects || []).filter(p => !p.completed && !p.ghost).forEach(proj => {
    (proj.tasks || []).forEach(task => {
      const start = task.date;
      const end = task.endDate || task.date;
      if (!start || dateStr < start || dateStr > end) return;

      let isMatch = false;
      let matchRoles = [];

      // Direct assignment
      if (task.person === personName) {
        isMatch = true;
        if (task.role) matchRoles.push(task.role);
      }

      // Review/event attendee
      if (task.attendees) {
        task.attendees.forEach(a => {
          if (a.person === personName) {
            isMatch = true;
            matchRoles.push(a.role || 'Attendee');
          }
        });
      }

      // PTO: check attendees + taskName
      if (task.isDueDate && task.milestoneType === 'pto') {
        const lp = personName.toLowerCase();
        if ((task.attendees || []).some(a => a.person && a.person.toLowerCase() === lp)) isMatch = true;
        if (task.taskName && task.taskName.toLowerCase().includes(lp)) isMatch = true;
      }

      if (isMatch) {
        results.push({
          ...task,
          projectName: proj.name,
          projectId: proj.id,
          matchRoles: [...new Set(matchRoles)]
        });
      }
    });
  });
  return results;
}

// ── WORKLOAD FOR A DAY ──
function getDayWorkload(personName, dateStr) {
  let total = 0;
  (state.projects || []).filter(p => !p.completed && !p.ghost).forEach(proj => {
    (proj.tasks || []).forEach(task => {
      if (task.isDueDate) return;
      const start = task.date;
      const end = task.endDate || task.date;
      if (!start || dateStr < start || dateStr > end) return;

      let isMatch = false;
      if (task.person === personName) isMatch = true;
      if (task.attendees) {
        task.attendees.forEach(a => { if (a.person === personName) isMatch = true; });
      }
      if (isMatch) total += loePts(task.loe);
    });
  });
  return total;
}

// ── MULTI-DAY INFO ──
function getMultiDayInfo(task, dateStr) {
  if (!task.endDate || task.endDate === task.date) return null;
  const start = new Date(task.date + 'T00:00:00');
  const end = new Date(task.endDate + 'T00:00:00');
  const current = new Date(dateStr + 'T00:00:00');
  const totalDays = Math.round((end - start) / 86400000) + 1;
  const currentDay = Math.round((current - start) / 86400000) + 1;
  return { currentDay, totalDays };
}
