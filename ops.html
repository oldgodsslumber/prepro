<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRE-PRO — Ops Mode</title>

<!-- Firebase -->
<script type="module">
import { initializeApp }                       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, set }      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey:      'AIzaSyDYyEv6eospGbtmWt6orY6b4X71jhdUyKI',
  authDomain:  'prepro-e2abc.firebaseapp.com',
  databaseURL: 'https://prepro-e2abc-default-rtdb.firebaseio.com',
  projectId:   'prepro-e2abc',
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

window._fb = { db, ref, set };
onValue(ref(db, 'prepro/state'), snapshot => {
  const data = snapshot.val();
  if (!data || !Array.isArray(data.projects)) return;
  window._fbState = data;
  if (window._opsReloadState) window._opsReloadState(data);
}, err => console.error('ops firebase error:', err));

onValue(ref(db, 'prepro/nameHistory'), snapshot => {
  const data = snapshot.val();
  if (data) { window._fbNameHistory = data; if (window._opsReloadNameHistory) window._opsReloadNameHistory(data); }
}, err => console.error('ops nameHistory firebase error:', err));

onValue(ref(db, 'prepro/peopleEmails'), snapshot => {
  const data = snapshot.val();
  if (data) { window._fbPeopleEmails = data; if (window._opsReloadPeopleEmails) window._opsReloadPeopleEmails(data); }
}, err => console.error('ops peopleEmails firebase error:', err));
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0d12;
  --panel:   #16161e;
  --card:    #1e1e28;
  --border:  #2c2c3e;
  --text:    #e0e0ec;
  --dim:     #8080a0;
  --accent:  #6c63ff;
  --danger:  #e05555;
  --cat-pre:   #4a90d9;
  --cat-prod:  #6c63ff;
  --cat-post:  #e07b39;
  --cat-edit:  #4cba6a;
  --cat-anim:  #7c5cbf;
  --cat-shoot: #c0394f;
}

body { background: var(--bg); color: var(--text); font-family: system-ui,-apple-system,sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── HEADER ── */
.ops-header { display: flex; align-items: center; gap: 14px; padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ops-header-title { font-size: 13px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); }
.ops-header-sub { font-size: 11px; color: var(--dim); }
.ops-header-spacer { flex: 1; }

/* ── LOWER NAV (under workload panel) ── */
.ops-nav { display: flex; gap: 6px; padding: 8px 14px; background: var(--panel); border-top: 1px solid var(--border); flex-shrink: 0; }
.ops-nav .data-mig-btn { font-size: 10px; font-weight: 600; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; transition: color .15s, border-color .15s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; }
.ops-nav .data-mig-btn:hover { color: var(--text); border-color: var(--accent); }
.ops-wknd-btn { font-size: 11px; font-weight: 600; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; transition: all .15s; }
.ops-wknd-btn.on { background: rgba(108,99,255,.18); color: var(--accent); border-color: var(--accent); }
.ops-zoom { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.ops-zoom-btn { font-size: 14px; line-height: 1; font-weight: 700; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 5px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; user-select: none; }
.ops-zoom-btn:hover { color: var(--text); border-color: var(--dim); }
.ops-zoom-btn:disabled { opacity: .3; cursor: default; }
.ops-zoom-label { font-size: 10px; font-weight: 600; color: var(--dim); min-width: 28px; text-align: center; }

/* ── CALENDAR NAV ── */
.cal-nav { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.cal-nav-title { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
.btn-today { font-size: 11px; font-weight: 600; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; }
.btn-today:hover { color: var(--text); }

/* ── CALENDAR ── */
.cal-dow-row { display: grid; flex-shrink: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 8px 8px 0 0; border-bottom: none; }
.cal-dow  { background: var(--card); text-align: center; font-size: 10px; font-weight: 700; color: var(--dim); padding: 6px 2px; text-transform: uppercase; letter-spacing: .07em; }
.cal-scroll { flex: 1; overflow-y: auto; overflow-anchor: none; min-height: 0; padding-bottom: 4px; }
.cal-sentinel { height: 1px; }
.cal-grid { display: grid; gap: 1px; background: var(--border); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
.cal-day  { background: var(--card); min-height: 88px; padding: 5px; display: flex; flex-direction: column; gap: 3px; }
.cal-day.neighbor { background: var(--panel); }
.cal-day.neighbor .cal-day-num { color: #3a3a55; }
.cal-day-num { font-size: 11px; font-weight: 600; color: var(--dim); line-height: 1; margin-bottom: 2px; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
.cal-day-num span { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; }
.cal-day.today .cal-day-num span { background: var(--accent); color: #fff; }
.cal-day-month-label { font-size: 9px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .07em; }

/* ── OPS TASK CHIPS ── */
.ops-chip { font-size: 10px; font-weight: 500; border-radius: 4px; padding: 2px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
.ops-chip-cat { font-size: 8px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; opacity: .85; flex-shrink: 0; }
.ops-chip-person { font-weight: 600; flex-shrink: 0; }
.ops-chip-task { opacity: .8; overflow: hidden; text-overflow: ellipsis; }
.ops-chip.dimmed { opacity: .18; }

/* ── BOTTOM PANEL ── */
.ops-bottom { display: flex; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--panel); height: 200px; }

/* Workload table (left) */
.ops-workload { flex: 1; min-width: 0; overflow-y: auto; padding: 8px 14px; border-right: 1px solid var(--border); }
.ops-workload-title { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.ops-wl-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.ops-wl-table th { text-align: left; font-size: 9px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .07em; padding: 2px 8px 4px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.ops-wl-table th:first-child { padding-left: 0; }
.ops-wl-table td { padding: 3px 8px; border-bottom: 1px solid rgba(44,44,62,.5); white-space: nowrap; }
.ops-wl-table td:first-child { padding-left: 0; color: var(--text); font-weight: 600; }
.ops-wl-table tr:last-child td { border-bottom: none; }
.wl-score { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; }
.wl-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; color: #fff; }

/* Filters (right) */
.ops-filters { width: 280px; flex-shrink: 0; padding: 8px 14px; overflow-y: auto; }
.ops-filters-title { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.ops-filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.ops-person-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; color: var(--text); cursor: pointer; transition: all .15s; user-select: none; }
.ops-person-chip .chip-dot { width: 7px; height: 7px; border-radius: 50%; }
.ops-person-chip.off { opacity: .35; }
.ops-person-chip:hover { border-color: var(--accent); }

/* ── EMPTY STATE ── */
.ops-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--dim); font-size: 13px; }

/* ── VIEW / DISPLAY TOGGLES ── */
.toggle-group { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; flex-shrink: 0; }
.toggle-btn { font-size: 11px; font-weight: 600; color: var(--dim); background: transparent; border: none; padding: 4px 12px; cursor: pointer; transition: all .15s; }
.toggle-btn.active { background: var(--accent); color: #fff; }
.toggle-btn:not(.active):hover { color: var(--text); }

/* ── FILTER ACTIONS ── */
.ops-filter-actions { display: flex; gap: 5px; margin-bottom: 6px; }
.ops-filter-action-btn { font-size: 10px; font-weight: 700; color: var(--dim); background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; cursor: pointer; transition: all .15s; }
.ops-filter-action-btn:hover { color: var(--text); border-color: var(--dim); }

/* ── HEADS UP VIEW ── */
.headsup-view { flex: 1; overflow-y: auto; padding: 20px 24px; display: none; }
.headsup-view.visible { display: block; }
.hu-section { margin-bottom: 24px; }
.hu-section-title { font-size: 10px; font-weight: 700; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
.hu-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; }
.hu-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.hu-body { flex: 1; min-width: 0; }
.hu-title { font-size: 13px; font-weight: 700; }
.hu-title a { color: var(--text); text-decoration: none; }
.hu-title a:hover { color: #6c63ff; text-decoration: underline; }
.hu-meta { font-size: 10px; color: var(--dim); margin-top: 2px; }
.hu-person { font-size: 11px; color: var(--text); margin-top: 2px; }
.hu-prompt { font-size: 11px; color: var(--dim); font-style: italic; margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--border); cursor: pointer; }
.hu-prompt:hover { color: var(--text); }
.hu-tasks { margin-top: 4px; }
.hu-task-item { font-size: 11px; color: var(--text); padding: 2px 0; display: flex; align-items: center; gap: 6px; }
.hu-task-item + .hu-task-item { border-top: 1px solid var(--border); }
.hu-empty { color: var(--dim); font-size: 13px; font-style: italic; padding: 20px 0; }
.hu-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
.hu-metric { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.hu-metric-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; }
.hu-metric-label { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; margin-top: 6px; }
.hu-metric-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }

/* ── METRICS VIEW ── */
.metrics-view { flex: 1; overflow-y: auto; padding: 20px 24px; display: none; }
.metrics-view.visible { display: block; }
.m-section { margin-bottom: 28px; }
.m-section-title { font-size: 11px; font-weight: 700; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
.m-empty { color: var(--dim); font-size: 12px; font-style: italic; }

.m-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
.m-tile { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.m-tile-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; }
.m-tile-label { font-size: 10px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; margin-top: 6px; }
.m-tile-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }

.m-chart { display: grid; grid-template-columns: 96px 1fr; gap: 4px; }
.m-chart-y { position: relative; height: 200px; }
.m-chart-y-label { position: absolute; right: 6px; transform: translateY(-50%); font-size: 10px; color: var(--dim); white-space: nowrap; line-height: 1; }
.m-chart-area { display: flex; flex-direction: column; min-width: 0; }
.m-chart-svg-wrap { height: 200px; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; }
.m-chart-svg { width: 100%; height: 100%; display: block; }
.m-chart-x { display: flex; padding: 4px 0 0; font-size: 9px; color: var(--dim); }
.m-chart-x > div { flex: 1; min-width: 8px; text-align: center; white-space: nowrap; overflow: hidden; }
.m-chart-x > div.today { color: #6c63ff; font-weight: 700; }
.m-chart-x > div.month { color: var(--text); font-weight: 700; }

.m-recap-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.m-recap-head .m-section-title { margin-bottom: 0; }
.m-recap-range { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 11px; }

.m-gantt { display: flex; flex-direction: column; gap: 4px; }
.m-gantt-row { display: grid; grid-template-columns: 200px 1fr; gap: 8px; align-items: center; font-size: 11px; }
.m-gantt-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.m-gantt-name a { color: var(--text); text-decoration: none; }
.m-gantt-name a:hover { color: #6c63ff; text-decoration: underline; }
.m-gantt-track { position: relative; height: 18px; background: #1a1a28; border-radius: 3px; overflow: hidden; }
.m-gantt-bar { position: absolute; top: 0; height: 100%; border-radius: 3px; opacity: .85; }
.m-gantt-bar:hover { opacity: 1; }
.m-gantt-today { position: absolute; top: 0; bottom: 0; width: 1px; background: #6c63ff; pointer-events: none; }
.m-gantt-axis { display: grid; grid-template-columns: 200px 1fr; gap: 8px; margin-top: 4px; }
.m-gantt-axis-track { position: relative; height: 14px; font-size: 9px; color: var(--dim); }
.m-gantt-axis-tick { position: absolute; transform: translateX(-50%); white-space: nowrap; }

.m-health-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.m-health-table th { font-size: 9px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
.m-health-table td { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text); }
.m-health-table td.dim { color: var(--dim); }
.m-health-table td a { color: var(--text); text-decoration: none; }
.m-health-table td a:hover { color: #6c63ff; text-decoration: underline; }

.m-cat-bar { display: flex; height: 24px; border-radius: 4px; overflow: hidden; margin-bottom: 10px; background: #1a1a28; }
.m-cat-seg { height: 100%; }
.m-cat-legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 11px; color: var(--text); }
.m-cat-legend.vertical { flex-direction: column; flex-wrap: nowrap; gap: 8px; }
.m-cat-legend-item { display: flex; align-items: center; gap: 6px; }
.m-cat-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.m-cat-pct { color: var(--dim); margin-left: 2px; }

.m-top-row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 20px; margin-bottom: 28px; }
.m-top-row .m-section { margin-bottom: 0; }
.m-pie-wrap { display: flex; align-items: center; gap: 20px; }
.m-pie-svg { flex-shrink: 0; }
.hu-card.pto { border-color: rgba(255,180,50,.25); }
.hu-card.review { border-color: rgba(192,57,79,.3); }
.hu-card.shoot { border-color: rgba(192,57,79,.4); }
.hu-card.milestone { border-color: rgba(108,99,255,.3); }
.hu-status-badge { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 8px; white-space: nowrap; }

/* ── STUDIO VIEW ── */
.studio-view { display: none; }
.studio-view.visible { display: block; }
.studio-info { font-size: 10px; margin-top: 3px; line-height: 1.5; }
.studio-info .studio-project { font-weight: 700; color: var(--text); }
.studio-info .studio-producer { color: var(--dim); }
.studio-info .studio-crew { color: var(--dim); font-size: 9px; }
.studio-info .studio-countdown { font-size: 9px; font-weight: 600; }
.studio-info .studio-countdown.soon { color: #e07b39; }
.studio-info .studio-countdown.imminent { color: #e05555; }
.studio-info .studio-countdown.past { color: var(--dim); opacity: .5; }

/* ── TIMELINE (PERSON) VIEW ── */
.person-view { flex: 1; min-height: 0; display: none; flex-direction: column; overflow: hidden; }
.person-view.visible { display: flex; }

.tl-scroll { flex: 1; overflow: auto; position: relative; min-height: 0; }
.tl-inner  { position: relative; display: inline-block; min-width: 100%; }

/* Sticky header: month row + day row */
.tl-header { position: sticky; top: 0; z-index: 20; background: var(--panel); border-bottom: 1px solid var(--border); user-select: none; }
.tl-month-row, .tl-day-row { display: flex; }

/* Name cells — sticky left in both header and person rows */
.tl-name-hd   { flex-shrink: 0; width: 130px; position: sticky; left: 0; z-index: 25; background: var(--panel); border-right: 1px solid var(--border); }
.tl-month-row .tl-name-hd { height: 20px; }
.tl-day-row   .tl-name-hd { height: 26px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: var(--dim); letter-spacing: .06em; }

/* Month spanning cells */
.tl-month-cell { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--accent); padding: 4px 6px; border-right: 1px solid var(--border); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex-shrink: 0; }

/* Day header cells */
.tl-day-cell  { flex-shrink: 0; font-size: 9px; font-weight: 600; color: var(--dim); text-align: center; padding: 4px 0; border-right: 1px solid rgba(44,44,62,.4); overflow: hidden; }
.tl-day-cell.today   { background: rgba(108,99,255,.18); color: var(--accent); font-weight: 800; }
.tl-day-cell.weekend { opacity: .4; }

/* Person rows */
.tl-person-row { display: flex; border-bottom: 1px solid var(--border); }
.tl-person-row.dimmed { opacity: .18; pointer-events: none; }

.tl-row-name { flex-shrink: 0; width: 130px; position: sticky; left: 0; z-index: 10; background: var(--card); border-right: 1px solid var(--border); display: flex; align-items: center; gap: 7px; padding: 0 6px 0 10px; font-size: 11px; font-weight: 600; color: var(--text); word-break: break-word; }
.tl-row-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tl-row-name-text { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.tl-reorder { display: flex; flex-direction: column; gap: 1px; margin-left: auto; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
.tl-row-name:hover .tl-reorder { opacity: 1; }
.tl-reorder-btn { width: 16px; height: 12px; display: flex; align-items: center; justify-content: center; font-size: 8px; color: var(--dim); background: var(--panel); border: 1px solid var(--border); border-radius: 2px; cursor: pointer; padding: 0; line-height: 1; }
.tl-reorder-btn:hover { color: var(--accent); border-color: var(--accent); }
.tl-person-row.drag-over-above { box-shadow: inset 0 2px 0 0 var(--accent); }
.tl-person-row.drag-over-below { box-shadow: inset 0 -2px 0 0 var(--accent); }

/* Scrollable track where task bars live */
.tl-track { flex: 1; position: relative; background: var(--card); }

/* Task bars */
.tl-task-bar { position: absolute; border-radius: 3px; color: #fff; display: flex; align-items: center; overflow: visible; cursor: grab; user-select: none; }
.tl-task-bar:active { cursor: grabbing; }
.tl-task-bar.dragging { opacity: .6; z-index: 50 !important; }
.tl-resize-handle { position: absolute; top: 0; bottom: 0; width: 7px; cursor: ew-resize; z-index: 3; }
.tl-resize-handle.left  { left: -3px; }
.tl-resize-handle.right { right: -3px; }
.tl-resize-handle::after { content: '⋮⋮'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 8px; opacity: 0; color: #fff; pointer-events: none; }
.tl-task-bar:hover .tl-resize-handle::after { opacity: .7; }
.tl-person-row.drop-target { background: rgba(108,99,255,.12); }
.tl-bar-inner { padding: 0 5px; display: flex; align-items: center; gap: 3px; overflow: hidden; min-width: 0; width: 100%; }
.tl-bar-cat  { font-size: 7px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; opacity: .85; flex-shrink: 0; }
.tl-bar-name { font-size: 9px; opacity: .9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.tl-bar-loe  { font-size: 8px; flex-shrink: 0; margin-left: auto; }

/* Today column highlight overlay */
.tl-today-col { position: absolute; top: 0; bottom: 0; width: 44px; background: rgba(108,99,255,.07); pointer-events: none; z-index: 1; }

/* Sentinels for infinite horizontal scroll */
.tl-sentinel-lr { position: absolute; top: 0; bottom: 0; width: 1px; pointer-events: none; }

/* ── SETTINGS MODAL ── */
.settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 9999; display: flex; align-items: center; justify-content: center; }
.settings-modal { width: min(820px, 95vw); max-height: 85vh; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.5); }
.settings-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.settings-title { font-weight: 700; font-size: 14px; color: var(--text); }
.settings-close { background: transparent; color: var(--dim); border: none; font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
.settings-close:hover { color: var(--text); background: rgba(255,255,255,.06); }
.settings-body { display: flex; flex-direction: column; min-height: 0; flex: 1; }
.settings-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--panel); }
.settings-tab { padding: 9px 18px; font-size: 12px; font-weight: 600; color: var(--dim); cursor: pointer; border-bottom: 2px solid transparent; user-select: none; }
.settings-tab:hover { color: var(--text); }
.settings-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.settings-content { padding: 16px; overflow-y: auto; flex: 1; min-height: 240px; }
.settings-btn { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; cursor: pointer; font-size: 12px; font-weight: 600; margin-right: 8px; transition: border-color .15s, color .15s; }
.settings-btn:hover { border-color: var(--accent); }
.settings-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.settings-section-title { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; margin: 0 0 10px; font-weight: 700; }
.settings-hint { font-size: 11px; color: var(--dim); margin: 6px 0 14px; line-height: 1.5; }
.people-list { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.people-row { display: grid; grid-template-columns: 140px 1fr 200px 28px; gap: 10px; align-items: center; padding: 7px 10px; border-bottom: 1px solid var(--border); background: var(--card); }
.people-row:last-child { border-bottom: none; }
.people-row .pname { font-weight: 600; color: var(--text); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.people-row input.pemail { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 5px 8px; color: var(--text); font-size: 12px; outline: none; width: 100%; transition: border-color .15s; }
.people-row input.pemail:focus { border-color: var(--accent); }
.people-row .proles { font-size: 10px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.people-row .pdel { background: transparent; color: var(--dim); border: none; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
.people-row .pdel:hover { color: #e07070; background: rgba(224,112,112,.08); }
.people-empty { padding: 20px; color: var(--dim); text-align: center; font-size: 12px; background: var(--card); border-radius: 6px; border: 1px dashed var(--border); }
.people-add { display: grid; grid-template-columns: 140px 1fr 160px auto; gap: 8px; margin-top: 14px; }
.people-add input, .people-add select { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px; color: var(--text); font-size: 12px; outline: none; transition: border-color .15s; }
.people-add input:focus, .people-add select:focus { border-color: var(--accent); }
.people-merge { margin-top: 18px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; }
.people-merge-title { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; font-weight: 700; }
.people-merge-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.people-merge select { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px; color: var(--text); font-size: 12px; outline: none; flex: 1; min-width: 120px; }
.people-merge-arrow { color: var(--dim); font-size: 13px; }
.data-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
</style>
</head>

<script>
'use strict';

// ── CONSTANTS ──
const LOE_PTS = { low: 1, medium: 2, high: 3 };
const CAT_COLORS = {
  'Pre-Production': '#4a90d9',
  'Producing':      '#6c63ff',
  'Post-Producing': '#e07b39',
  'Editing':        '#4cba6a',
  'Animation':      '#7c5cbf',
  'Production':     '#c0394f',
};
const DOW_ALL = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_WD  = ['Mon','Tue','Wed','Thu','Fri'];
const MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SHOOT_LABELS = ['Studio Shoot','On-Location Shoot'];

// ── TIMELINE CONSTANTS ──
const TL_NAME_W     = 130;
const TL_BAR_H      = 22;
const TL_LANE_H     = TL_BAR_H + 3;
const TL_PAD        = 6;
const TL_WEEKS_INIT = 16;
const TL_WEEKS_EXT  = 8;
const TL_ZOOM_STEPS = [18, 26, 36, 50, 70, 100]; // px per visible day column

// ── STATE ──
let showWeekends = false;
let hiddenPeople = new Set();
let calEarliestDate = null;
let calLatestDate   = null;
let calObserver     = null;
let chipDisplay = 'categories'; // 'categories' | 'tasks'
let personOrder = JSON.parse(localStorage.getItem('ops_person_order') || '[]'); // persisted row order
let viewMode    = 'headsup';    // 'headsup' | 'person' | 'studio' | 'metrics'
let metricsRecapRange = 'quarter'; // '30d' | 'quarter' | '6mo' | 'ytd'

// Timeline-specific state
let tlStart    = '';
let tlEnd      = '';
let tlObserver = null;
let tlColW     = 50;              // current px per visible day column (zoom)
let tlDates    = [];              // ordered array of visible date strings
let tlDateMap  = new Map();       // date string → column index

// ── LOAD DATA (Firebase) ──
let state = { projects: [] };
let _suppressRemoteRender = 0;  // counter to avoid re-render echo from our own writes

function saveState() {
  if (!window._fb) return;
  _suppressRemoteRender++;
  const { db, ref, set } = window._fb;
  set(ref(db, 'prepro/state'), state).catch(err => console.error('saveState:', err));
}

function reloadState(newState) {
  if (_suppressRemoteRender > 0) { _suppressRemoteRender--; if (newState) state = newState; return; }
  if (newState) state = newState;
  renderFilterChips();
  renderWorkload();
  if (viewMode === 'person') renderTimeline();
  else if (viewMode === 'headsup') renderHeadsUp();
  else if (viewMode === 'studio') renderStudio();
  else if (viewMode === 'metrics') renderMetrics();
  else renderCalendar();
}

// ── DRAG / RESIZE STATE ──
let tlDragState  = null;  // { entry, bar, startX, origDate, origEndDate, origPersonRow }
let tlResizeState = null; // { entry, bar, side, startX }

window._opsReloadState = reloadState;
if (window._fbState) reloadState(window._fbState);

// ── ROLE_CATS (mirrors index.html — used only by Settings → People tab) ──
const ROLE_CATS = [
  { label: 'Internal Team', color: '#4a90d9', roles: ['Producer', 'Editor', 'Animator'] },
  { label: 'External',      color: '#e07b39', roles: ['Copywriter', 'Designer', 'Stakeholder'] },
  { label: 'Vendors',       color: '#7c5cbf', roles: ['External Vendor'] },
  { label: 'Other',         color: '#4cba6a', roles: ['Other'] }
];

// ── NAME HISTORY & PEOPLE EMAILS (synced via Firebase) ──
let nameHistory = {};
let peopleEmails = {};

function saveNameHistory() {
  if (!window._fb) return;
  const { db, ref, set } = window._fb;
  set(ref(db, 'prepro/nameHistory'), nameHistory).catch(err => console.error('saveNameHistory:', err));
}
function savePeopleEmails() {
  if (!window._fb) return;
  const { db, ref, set } = window._fb;
  set(ref(db, 'prepro/peopleEmails'), peopleEmails).catch(err => console.error('savePeopleEmails:', err));
}
function setPersonEmail(name, email) {
  const clean = (email || '').trim();
  if (clean) peopleEmails[name] = clean;
  else delete peopleEmails[name];
  savePeopleEmails();
}
function getPersonEmail(name) { return peopleEmails[name] || ''; }

window._opsReloadNameHistory = function(data) {
  if (data && typeof data === 'object') nameHistory = data;
  if (document.getElementById('settingsOverlay') && document.getElementById('settingsOverlay').style.display === 'flex') renderSettingsContent();
};
window._opsReloadPeopleEmails = function(data) {
  if (data && typeof data === 'object') peopleEmails = data;
  if (document.getElementById('settingsOverlay') && document.getElementById('settingsOverlay').style.display === 'flex') renderSettingsContent();
};
if (window._fbNameHistory) window._opsReloadNameHistory(window._fbNameHistory);
if (window._fbPeopleEmails) window._opsReloadPeopleEmails(window._fbPeopleEmails);

function collectAllPeople() {
  const people = {};
  const touch = (name, role) => {
    if (!name) return;
    if (!people[name]) people[name] = { name, email: peopleEmails[name] || '', roles: new Set() };
    if (role) people[name].roles.add(role);
  };
  Object.entries(nameHistory || {}).forEach(([role, names]) => (names || []).forEach(n => touch(n, role)));
  (state.projects || []).forEach(p => {
    const roster = p.roster || {};
    Object.entries(roster).forEach(([role, names]) => (names || []).forEach(n => touch(n, role)));
  });
  Object.keys(peopleEmails || {}).forEach(n => touch(n, null));
  return Object.values(people).sort((a,b) => a.name.localeCompare(b.name));
}

function deletePersonEverywhere(name) {
  Object.keys(nameHistory || {}).forEach(role => {
    nameHistory[role] = (nameHistory[role] || []).filter(n => n !== name);
  });
  (state.projects || []).forEach(p => {
    const roster = p.roster || {};
    Object.keys(roster).forEach(role => {
      roster[role] = (roster[role] || []).filter(n => n !== name);
    });
    (p.tasks || []).forEach(t => {
      if (t.person === name) t.person = '';
      if (Array.isArray(t.attendees)) t.attendees = t.attendees.filter(a => a.person !== name);
    });
  });
  delete peopleEmails[name];
  saveNameHistory();
  savePeopleEmails();
  saveState();
}

function mergePersonInto(from, into) {
  if (!from || !into || from === into) return;
  Object.keys(nameHistory || {}).forEach(role => {
    const list = nameHistory[role] || [];
    if (list.includes(from)) {
      nameHistory[role] = list.filter(n => n !== from);
      if (!nameHistory[role].includes(into)) nameHistory[role].push(into);
    }
  });
  (state.projects || []).forEach(p => {
    const roster = p.roster || {};
    Object.keys(roster).forEach(role => {
      const list = roster[role] || [];
      if (list.includes(from)) {
        roster[role] = list.filter(n => n !== from);
        if (!roster[role].includes(into)) roster[role].push(into);
      }
    });
    (p.tasks || []).forEach(t => {
      if (t.person === from) t.person = into;
      if (Array.isArray(t.attendees)) {
        t.attendees.forEach(a => { if (a.person === from) a.person = into; });
        const seen = new Set();
        t.attendees = t.attendees.filter(a => {
          const k = a.person + '|' + (a.role || '');
          if (seen.has(k)) return false;
          seen.add(k); return true;
        });
      }
    });
  });
  if (!peopleEmails[into] && peopleEmails[from]) peopleEmails[into] = peopleEmails[from];
  delete peopleEmails[from];
  saveNameHistory();
  savePeopleEmails();
  saveState();
}

// ── SETTINGS MODAL ──
let settingsActiveTab = 'data';

function opsRerender() {
  if (viewMode === 'person') renderTimeline();
  else if (viewMode === 'headsup') renderHeadsUp();
  else if (viewMode === 'studio') renderStudio();
  else if (viewMode === 'metrics') renderMetrics();
  else renderCalendar();
  renderFilterChips();
  renderWorkload();
}

function openSettings(tab) {
  settingsActiveTab = tab || 'data';
  document.querySelectorAll('.settings-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.settingsTab === settingsActiveTab);
  });
  document.getElementById('settingsOverlay').style.display = 'flex';
  renderSettingsContent();
}
function closeSettings() {
  document.getElementById('settingsOverlay').style.display = 'none';
}

function renderSettingsContent() {
  const c = document.getElementById('settingsContent');
  if (!c) return;
  c.innerHTML = '';
  if (settingsActiveTab === 'data') renderDataSettings(c);
  else if (settingsActiveTab === 'people') renderPeopleSettings(c);
}

function renderDataSettings(c) {
  const title = document.createElement('div');
  title.className = 'settings-section-title';
  title.textContent = 'Backup & Restore';
  c.appendChild(title);

  const actions = document.createElement('div');
  actions.className = 'data-actions';
  const expBtn = document.createElement('button');
  expBtn.className = 'settings-btn primary';
  expBtn.textContent = '⬇ Export Data';
  expBtn.addEventListener('click', doExportData);
  const impBtn = document.createElement('button');
  impBtn.className = 'settings-btn';
  impBtn.textContent = '⬆ Import Data';
  impBtn.addEventListener('click', () => {
    if (!confirm('Importing will merge projects from the file into your current data.\n\nProjects with the same ID will be overwritten. Continue?')) return;
    document.getElementById('importFileInput').click();
  });
  actions.appendChild(expBtn);
  actions.appendChild(impBtn);
  c.appendChild(actions);

  const hint = document.createElement('div');
  hint.className = 'settings-hint';
  hint.textContent = 'Export downloads a JSON backup of every project, name history, and saved emails. Import merges projects by ID (overwrites duplicates) and adds new names/emails.';
  c.appendChild(hint);
}

function doExportData() {
  const payload = {
    version: 2,
    exported: new Date().toISOString(),
    prepro_data: JSON.stringify(state),
    prepro_name_history: JSON.stringify(nameHistory),
    prepro_people_emails: JSON.stringify(peopleEmails)
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'prepro-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function handleImportFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      const rawData    = payload.prepro_data    || (payload.projects ? JSON.stringify(payload) : null);
      const rawHistory = payload.prepro_name_history || null;
      const rawEmails  = payload.prepro_people_emails || null;
      if (!rawData) { alert('File doesn\'t look like a PRE-PRO backup.'); return; }

      const incoming = JSON.parse(rawData);
      if (!Array.isArray(incoming.projects)) { alert('No projects found in file.'); return; }

      const idMap = new Map((state.projects || []).map(p => [p.id, p]));
      incoming.projects.forEach(p => idMap.set(p.id, p));
      state.projects = [...idMap.values()];
      saveState();

      if (rawHistory) {
        try {
          const inHist = JSON.parse(rawHistory);
          Object.entries(inHist).forEach(([role, names]) => {
            if (!nameHistory[role]) nameHistory[role] = [];
            names.forEach(n => { if (!nameHistory[role].includes(n)) nameHistory[role].push(n); });
          });
          saveNameHistory();
        } catch(_) {}
      }
      if (rawEmails) {
        try {
          const inEmails = JSON.parse(rawEmails);
          Object.entries(inEmails).forEach(([name, email]) => {
            if (!peopleEmails[name]) peopleEmails[name] = email;
          });
          savePeopleEmails();
        } catch(_) {}
      }

      opsRerender();
      renderSettingsContent();
      alert('Import complete — ' + incoming.projects.length + ' project(s) merged successfully.');
    } catch(err) {
      alert('Failed to read file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function renderPeopleSettings(c) {
  const title = document.createElement('div');
  title.className = 'settings-section-title';
  title.textContent = 'People & Emails';
  c.appendChild(title);

  const hint = document.createElement('div');
  hint.className = 'settings-hint';
  hint.textContent = 'Add an email to any person to auto-fill the To: line when exporting meetings to Outlook. Deleting a person removes them from every project roster and unassigns their tasks. Merging moves all roles, rosters, and assignments from one person to another.';
  c.appendChild(hint);

  const people = collectAllPeople();
  if (!people.length) {
    const empty = document.createElement('div');
    empty.className = 'people-empty';
    empty.textContent = 'No people yet. Add one below.';
    c.appendChild(empty);
  } else {
    const list = document.createElement('div');
    list.className = 'people-list';
    people.forEach(p => {
      const row = document.createElement('div');
      row.className = 'people-row';

      const nm = document.createElement('div');
      nm.className = 'pname';
      nm.textContent = p.name;
      nm.title = p.name;
      row.appendChild(nm);

      const emailInput = document.createElement('input');
      emailInput.className = 'pemail';
      emailInput.type = 'email';
      emailInput.placeholder = 'email@example.com';
      emailInput.value = p.email;
      emailInput.addEventListener('blur', () => setPersonEmail(p.name, emailInput.value));
      emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') emailInput.blur(); });
      row.appendChild(emailInput);

      const rolesEl = document.createElement('div');
      rolesEl.className = 'proles';
      const rolesArr = Array.from(p.roles);
      rolesEl.textContent = rolesArr.length ? rolesArr.join(', ') : '—';
      rolesEl.title = rolesEl.textContent;
      row.appendChild(rolesEl);

      const del = document.createElement('button');
      del.className = 'pdel';
      del.textContent = '✕';
      del.title = 'Delete ' + p.name + ' everywhere';
      del.addEventListener('click', () => {
        if (!confirm('Delete "' + p.name + '" from every project roster, unassign their tasks, and remove their email?\n\nThis cannot be undone.')) return;
        deletePersonEverywhere(p.name);
        renderSettingsContent();
        opsRerender();
      });
      row.appendChild(del);

      list.appendChild(row);
    });
    c.appendChild(list);
  }

  const addTitle = document.createElement('div');
  addTitle.className = 'settings-section-title';
  addTitle.style.marginTop = '18px';
  addTitle.textContent = 'Add Person';
  c.appendChild(addTitle);

  const addRow = document.createElement('div');
  addRow.className = 'people-add';
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.placeholder = 'Name';
  const emailInput = document.createElement('input');
  emailInput.type = 'email';
  emailInput.placeholder = 'email@example.com (optional)';
  const roleSel = document.createElement('select');
  const defaultOpt = document.createElement('option');
  defaultOpt.value = ''; defaultOpt.textContent = 'Role (optional)';

  'schedules','schedule','copywriting','copywrite','copyediting','copyedit',
  'meeting','brief','concept','concepting','conceptual','planning','prep',

  'vo session','vo direction','vendor billing','vendor prep','vendor payment',

  'illustration','illustrate','illustrating','illustrations'
];
const PW_POST = [
  'animation','edit','editing','motion','vfx','visual effects',
  'drafting','v1','v2','vf','revision','revisions','revise',
  'post','post-production','color','colour','grade','color correct','colour correct',
  'mix','audio mix','sound mix','sound design',

];

function getProducerCat(name) {
  const n = (name || '').toLowerCase();
  if (PW_PRE.some(k => n.includes(k))) return 'Pre-Production';
  if (PW_POST.some(k => n.includes(k))) return 'Post-Producing';
  return 'Producing';
}

function getTaskCat(task) {
  if (task.isReview) {
    if (SHOOT_LABELS.includes(task.reviewLabel)) return 'Production';
    return getProducerCat(task.taskName);
  }
  const role = (task.role || '').toLowerCase();
  if (role === 'editor')   return 'Editing';
  if (role === 'animator') return 'Animation';
  if (role === 'producer') return getProducerCat(task.taskName);
  return null;
}

// ── COLLECT ALL OPS TASKS ──
// Returns flat list of { date, endDate, person, cat, taskName, loe, color, projectName }
function getOpsEntries() {
  const entries = [];
  (state.projects || []).filter(p => !p.completed && !p.ghost).forEach(proj => {
    (proj.tasks || []).forEach(task => {
      if (task.isDueDate) return;
      const loe = task.loe || 'medium';
      if (task.isReview) {
        const cat = getTaskCat(task);
        const color = CAT_COLORS[cat] || '#6c63ff';
        const internalAtts = (task.attendees || []).filter(a => a.category === 'Internal Team');
        if (internalAtts.length) {
          internalAtts.forEach((att, attIdx) => {
            entries.push({ date: task.date, endDate: task.endDate || task.date, person: att.person || att.role, cat, taskName: task.taskName || task.reviewLabel || 'Review', loe, color, projectName: proj.name, projectId: proj.id, taskId: task.id, isReview: true, attIdx });
          });
        }
        return;
      }
      if (task.roleCategory !== 'Internal Team') return;
      const cat = getTaskCat(task);
      if (!cat) return;
      const color = CAT_COLORS[cat] || '#6c63ff';
      entries.push({ date: task.date, endDate: task.endDate || task.date, person: task.person || task.role, cat, taskName: task.taskName || '(untitled)', loe, color, projectName: proj.name, projectId: proj.id, taskId: task.id });
    });
  });
  return entries;
}

// ── PEOPLE LIST ──
function getAllPeople() {
  const people = new Set();
  getOpsEntries().forEach(e => { if (e.person) people.add(e.person); });
  const alpha = [...people].sort();
  if (!personOrder.length) return alpha;
  // Saved order first (only those still present), then any new people alphabetically
  const ordered = personOrder.filter(p => people.has(p));
  const rest = alpha.filter(p => !personOrder.includes(p));
  return [...ordered, ...rest];
}
function savePersonOrder(arr) {
  personOrder = arr;
  try { localStorage.setItem('ops_person_order', JSON.stringify(arr)); } catch(_) {}
}
function movePerson(person, dir) {
  const current = getAllPeople();
  const idx = current.indexOf(person);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= current.length) return;
  current.splice(idx, 1);
  current.splice(newIdx, 0, person);
  savePersonOrder(current);
  renderTimeline();
}

// ── WORKLOAD ──
function loePts(loe) { return LOE_PTS[loe] || 2; }

function dateInRange(dateStr, startStr, endStr) {
  return dateStr >= startStr && dateStr <= endStr;
}

function rangesOverlap(s1, e1, s2, e2) {
  return s1 <= e2 && e1 >= s2;
}

// Returns the total effort score for a single day
function getDayWorkload(person, dateStr) {
  let total = 0;
  getOpsEntries().forEach(e => {
    if (e.person !== person) return;
    if (dateStr >= e.date && dateStr <= e.endDate) total += loePts(e.loe);
  });
  return total;
}

// Check if a person has PTO on a given date (scans all non-completed projects)
function isPersonPTO(person, dateStr) {
  const lowerPerson = person.toLowerCase();
  for (const proj of (state.projects || [])) {
    for (const t of (proj.tasks || [])) {
      if (!t.isDueDate || t.milestoneType !== 'pto') continue;
      const end = t.endDate || t.date;
      if (dateStr < t.date || dateStr > end) continue;
      // Check attendees
      if ((t.attendees || []).some(a => a.person && a.person.toLowerCase() === lowerPerson)) return true;
      // Check taskName contains person name (e.g. "John PTO")
      if (t.taskName && t.taskName.toLowerCase().includes(lowerPerson)) return true;
    }
  }
  return false;
}

// Returns the average daily score across the weekdays in a Mon–Sun window, excluding PTO days
function getAvgWorkload(person, weekMonday) {
  const entries = getOpsEntries().filter(e => e.person === person);
  if (!entries.length) return 0;
  let total = 0;
  let workDays = 0;
  for (let i = 0; i < 5; i++) {
    const ds = addDays(weekMonday, i);
    if (isPersonPTO(person, ds)) continue;
    workDays++;
    entries.forEach(e => { if (ds >= e.date && ds <= e.endDate) total += loePts(e.loe); });
  }
  if (workDays === 0) return 0;
  return Math.round((total / workDays) * 10) / 10;
}

function workloadInfo(pts) {
  if (pts === 0)  return { label: '—',          color: '#4a4a60', emoji: '' };
  if (pts < 1.5)  return { label: 'Light',       color: '#4cba6a', emoji: '🟢' };
  if (pts < 2.5)  return { label: 'Manageable',  color: '#9ab84c', emoji: '🟡' };
  if (pts < 3.5)  return { label: 'Busy',        color: '#e07b39', emoji: '🟠' };
  if (pts < 4.5)  return { label: 'Very Busy',   color: '#c0394f', emoji: '🔴' };
  return            { label: 'Overloaded',     color: '#8b1a2a', emoji: '🚨' };
}

function fmtDate(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function getWeekStart(dateStr) {
  const d = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
  const day = d.getDay(); // 0=Sun
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return fmtDate(mon.getFullYear(), mon.getMonth() + 1, mon.getDate());
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return fmtDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
}

function todayStr() {
  const d = new Date();
  return fmtDate(d.getFullYear(), d.getMonth() + 1, d.getDate());
}

// ── WORKLOAD TABLE ──
function renderWorkload() {
  const tbody = document.getElementById('wlBody');
  tbody.innerHTML = '';
  const people = getAllPeople();
  if (!people.length) { tbody.innerHTML = '<tr><td colspan="5" style="color:var(--dim);padding:8px 0">No internal team tasks found</td></tr>'; return; }

  const today         = todayStr();
  const thisWeekStart = getWeekStart(today);
  const nextWeekStart = addDays(thisWeekStart, 7);
  const twoWeekStart  = addDays(thisWeekStart, 14);

  people.forEach(person => {
    const todayPts  = getDayWorkload(person, today);
    const thisWkAvg = getAvgWorkload(person, thisWeekStart);
    const nextWkAvg = getAvgWorkload(person, nextWeekStart);
    const twoWkAvg  = getAvgWorkload(person, twoWeekStart);

    const tr = document.createElement('tr');
    if (hiddenPeople.has(person)) tr.style.opacity = '.3';

    const mkCell = (pts, isToday) => {
      const info = workloadInfo(pts);
      const td = document.createElement('td');
      td.title = isToday ? `Total score today: ${pts}` : `Avg daily score: ${pts}`;
      const scoreStr = pts > 0 ? pts + ' · ' : '';
      td.innerHTML = `<span class="wl-score">${info.emoji ? info.emoji + ' ' : ''}<span style="color:${info.color};font-weight:600">${scoreStr}${info.label}</span></span>`;
      return td;
    };

    const nameTd = document.createElement('td');
    nameTd.textContent = person;
    tr.appendChild(nameTd);
    tr.appendChild(mkCell(todayPts, true));
    tr.appendChild(mkCell(thisWkAvg));
    tr.appendChild(mkCell(nextWkAvg));
    tr.appendChild(mkCell(twoWkAvg));
    tbody.appendChild(tr);
  });
}
